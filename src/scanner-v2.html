<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stratum Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #07090f;
    --bg-1: #0d1220;
    --bg-2: #141a2e;
    --bg-3: #1c2440;
    --line: rgba(255,255,255,0.06);
    --line-bright: rgba(255,255,255,0.12);
    --txt-0: #ffffff;
    --txt-1: #c9d1e0;
    --txt-2: #8a93a8;
    --txt-3: #5a6378;
    --green: #14e87a;
    --green-soft: rgba(20, 232, 122, 0.12);
    --red: #ff4d6d;
    --red-soft: rgba(255, 77, 109, 0.12);
    --aqua: #4dd6ff;
    --aqua-soft: rgba(77, 214, 255, 0.12);
    --amber: #ffb84d;
    --amber-soft: rgba(255, 184, 77, 0.12);
    --purple: #b478ff;
    --purple-soft: rgba(180, 120, 255, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: radial-gradient(ellipse at top, #14182c 0%, #07090f 60%);
    color: var(--txt-0);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 4px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, #4dd6ff 0%, #b478ff 100%);
    display: grid; place-items: center;
    font-weight: 800; font-size: 18px; color: #07090f;
    box-shadow: 0 0 24px rgba(77, 214, 255, 0.5);
  }
  .brand-name {
    font-size: 14px; font-weight: 700; letter-spacing: 0.06em; color: var(--txt-1);
  }
  .brand-sub {
    font-size: 11px; font-weight: 500; color: var(--txt-3);
    letter-spacing: 0.16em; text-transform: uppercase;
  }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .pill-mini {
    font-size: 10px; font-weight: 600; padding: 5px 10px;
    border-radius: 999px; background: rgba(255,255,255,0.04);
    color: var(--txt-2); letter-spacing: 0.06em; text-transform: uppercase;
  }
  .pill-mini.live::before {
    content: ""; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    margin-right: 6px; animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 1px;
    background: var(--line);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04) inset;
  }
  .stat {
    padding: 16px 20px;
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-key {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--txt-3);
  }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--txt-0); }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.aqua { color: var(--aqua); }

  /* FILTERS */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 4px;
  }
  .filter {
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: var(--txt-2);
    font-size: 12px; font-weight: 600;
    cursor: pointer; user-select: none;
    transition: background .15s ease, color .15s ease;
    border: 1px solid transparent;
  }
  .filter:hover { background: rgba(255,255,255,0.07); color: var(--txt-1); }
  .filter.active {
    background: linear-gradient(135deg, rgba(77,214,255,0.18), rgba(180,120,255,0.18));
    color: var(--txt-0);
    border-color: rgba(77,214,255,0.32);
    box-shadow: 0 0 16px rgba(77, 214, 255, 0.18);
  }
  .filter .count {
    margin-left: 6px;
    font-size: 10px;
    color: var(--txt-3);
    font-weight: 500;
  }
  .filter.active .count { color: var(--txt-1); }

  /* CARD GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }

  .card {
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04) inset;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .15s ease;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(77,214,255,0.18) inset;
  }
  .card.long {
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 70%, rgba(20,232,122,0.04) 100%);
  }
  .card.short {
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 70%, rgba(255,77,109,0.04) 100%);
  }
  .card.earnings-block {
    box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,184,77,0.32) inset;
  }
  .card.fomc-block {
    box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,77,109,0.32) inset;
  }

  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .ticker {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .dir-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 9px;
    border-radius: 6px;
    text-transform: uppercase;
  }
  .dir-pill.call { background: var(--green-soft); color: var(--green); }
  .dir-pill.put  { background: var(--red-soft);   color: var(--red); }

  .score-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 12px;
    border-radius: 12px;
    background: rgba(0,0,0,0.3);
    min-width: 60px;
  }
  .score-num {
    font-size: 22px; font-weight: 800; line-height: 1;
  }
  .score-num.high { color: var(--green); }
  .score-num.mid  { color: var(--amber); }
  .score-num.low  { color: var(--txt-2); }
  .score-lbl {
    font-size: 9px; color: var(--txt-3);
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-top: 2px;
  }

  .pattern {
    font-size: 12px;
    font-weight: 600;
    color: var(--txt-1);
    background: rgba(255,255,255,0.03);
    padding: 6px 10px;
    border-radius: 8px;
    display: inline-block;
    align-self: flex-start;
  }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    font-size: 11px;
  }
  .metric { display: flex; justify-content: space-between; gap: 8px; }
  .metric-key {
    color: var(--txt-3);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .metric-val {
    color: var(--txt-1);
    font-weight: 600;
    text-align: right;
  }
  .metric-val.green { color: var(--green); }
  .metric-val.red   { color: var(--red); }

  .note {
    font-size: 11px;
    color: var(--txt-2);
    line-height: 1.4;
    border-top: 1px solid var(--line);
    padding-top: 10px;
  }

  /* TIMING BADGE — the "should I fire now?" answer */
  .timing {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(0,0,0,0.25);
    box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset;
  }
  .timing.green {
    background: linear-gradient(135deg, rgba(20,232,122,0.20), rgba(20,232,122,0.06));
    box-shadow: 0 0 0 1px rgba(20,232,122,0.32) inset, 0 0 16px rgba(20,232,122,.10);
  }
  .timing.amber {
    background: linear-gradient(135deg, rgba(255,184,77,0.20), rgba(255,184,77,0.06));
    box-shadow: 0 0 0 1px rgba(255,184,77,0.32) inset;
  }
  .timing.red {
    background: linear-gradient(135deg, rgba(255,77,109,0.20), rgba(255,77,109,0.06));
    box-shadow: 0 0 0 1px rgba(255,77,109,0.32) inset;
  }
  .timing.gray {
    background: rgba(140,150,170,0.08);
    box-shadow: 0 0 0 1px rgba(140,150,170,0.18) inset;
    opacity: 0.7;
  }
  .timing-icon {
    font-size: 24px;
    line-height: 1;
  }
  .timing-text { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .timing-verdict {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .timing.green .timing-verdict { color: var(--green); }
  .timing.amber .timing-verdict { color: var(--amber); }
  .timing.red   .timing-verdict { color: var(--red); }
  .timing.gray  .timing-verdict { color: var(--txt-2); }
  .timing-msg {
    font-size: 11px;
    color: var(--txt-1);
    font-weight: 600;
  }
  .timing-sub {
    font-size: 10px;
    color: var(--txt-3);
  }
  .timing-countdown {
    text-align: right;
    display: flex; flex-direction: column; gap: 2px;
    min-width: 70px;
  }
  .timing-countdown-val {
    font-size: 14px;
    font-weight: 700;
    color: var(--txt-1);
  }
  .timing-countdown-lbl {
    font-size: 9px;
    color: var(--txt-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Spot-vs-trigger proximity bar */
  .prox {
    margin-top: 4px;
    height: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    position: relative;
    overflow: visible;
  }
  .prox-trigger {
    position: absolute;
    top: -3px; bottom: -3px;
    width: 2px;
    background: var(--aqua);
    box-shadow: 0 0 6px rgba(77,214,255,0.6);
  }
  .prox-stop {
    position: absolute;
    top: 0; bottom: 0;
    background: rgba(255,77,109,0.25);
    border-radius: 3px;
  }
  .prox-tp {
    position: absolute;
    top: 0; bottom: 0;
    background: rgba(20,232,122,0.18);
    border-radius: 3px;
  }
  .prox-spot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px #fff, 0 0 0 2px var(--bg-2);
  }
  .prox-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--txt-3);
    margin-top: 4px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  /* Mobile responsive */
  @media (max-width: 600px) {
    .app { padding: 14px 12px 40px; gap: 14px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .ticker { font-size: 24px; }
    .timing-icon { font-size: 20px; }
    .timing-verdict { font-size: 13px; }
    .stats { grid-template-columns: repeat(3, 1fr); }
    .stat { padding: 10px 12px; }
    .stat-val { font-size: 16px; }
    .stat-key { font-size: 9px; }
  }

  .tags {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .tag {
    font-size: 9px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tag.preferred { background: var(--green-soft); color: var(--green); }
  .tag.neutral   { background: var(--aqua-soft); color: var(--aqua); }
  .tag.block     { background: var(--red-soft); color: var(--red); }
  .tag.warn      { background: var(--amber-soft); color: var(--amber); }
  .tag.sector    { background: var(--purple-soft); color: var(--purple); }
  .tag.swing     { background: var(--purple-soft); color: var(--purple); border: 1px solid rgba(180,120,255,0.32); }
  .tag.day       { background: var(--aqua-soft); color: var(--aqua); border: 1px solid rgba(77,214,255,0.32); }
  .tag.scalp     { background: var(--amber-soft); color: var(--amber); border: 1px solid rgba(255,184,77,0.32); }

  /* TAB NAV */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-1);
    border-radius: 12px;
    padding: 4px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px;
    border-radius: 8px;
    color: var(--txt-2);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
    transition: background .15s ease, color .15s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tab:hover { background: rgba(255,255,255,0.04); color: var(--txt-1); }
  .tab.active {
    background: linear-gradient(135deg, rgba(77,214,255,0.14), rgba(180,120,255,0.14));
    color: var(--txt-0);
    box-shadow: 0 0 0 1px rgba(77,214,255,0.28) inset;
  }
  .tab.disabled { opacity: 0.35; cursor: not-allowed; }
  .tab .badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    font-size: 9px;
    color: var(--txt-2);
  }
  .tab.active .badge { background: rgba(77,214,255,0.2); color: var(--aqua); }

  /* SIM/LIVE toggle */
  .pill-mini.sim {
    cursor: pointer;
    background: rgba(255,184,77,0.12);
    color: var(--amber);
    border: 1px solid rgba(255,184,77,0.32);
  }
  .pill-mini.live-acct {
    cursor: pointer;
    background: rgba(255,77,109,0.12);
    color: var(--red);
    border: 1px solid rgba(255,77,109,0.32);
  }

  /* LVL TAB - multi-TF stacked pills per card */
  .lvl-tfrow {
    display: flex; flex-direction: column; gap: 6px;
  }
  .lvl-tfpill {
    display: grid;
    grid-template-columns: 32px 22px 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,0.25);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
    font-size: 11px;
    font-weight: 600;
  }
  .lvl-tfpill-tf {
    font-size: 11px;
    font-weight: 800;
    color: var(--txt-3);
    letter-spacing: 0.1em;
  }
  .lvl-tfpill-icon { font-size: 14px; line-height: 1; text-align: center; }
  .lvl-tfpill-txt {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--txt-1);
  }
  .lvl-tfpill-px {
    font-size: 10px;
    color: var(--txt-2);
    font-weight: 600;
  }
  .lvl-tfpill.lvl-green {
    background: linear-gradient(90deg, rgba(20,232,122,0.18), rgba(20,232,122,0.05));
    box-shadow: 0 0 0 1px rgba(20,232,122,0.32) inset, 0 0 12px rgba(20,232,122,0.08);
  }
  .lvl-tfpill.lvl-green .lvl-tfpill-txt { color: var(--green); }
  .lvl-tfpill.lvl-red {
    background: linear-gradient(90deg, rgba(255,77,109,0.18), rgba(255,77,109,0.05));
    box-shadow: 0 0 0 1px rgba(255,77,109,0.32) inset, 0 0 12px rgba(255,77,109,0.08);
  }
  .lvl-tfpill.lvl-red .lvl-tfpill-txt { color: var(--red); }
  .lvl-tfpill.lvl-aqua {
    background: linear-gradient(90deg, rgba(77,214,255,0.16), rgba(77,214,255,0.05));
    box-shadow: 0 0 0 1px rgba(77,214,255,0.28) inset;
  }
  .lvl-tfpill.lvl-aqua .lvl-tfpill-txt { color: var(--aqua); }
  .lvl-tfpill.lvl-gray {
    background: rgba(140,150,170,0.06);
    box-shadow: 0 0 0 1px rgba(140,150,170,0.18) inset;
    opacity: 0.7;
  }
  .lvl-tfpill.lvl-gray .lvl-tfpill-txt { color: var(--txt-2); }

  .metric-val.aqua  { color: var(--aqua); }
  .metric-val.red   { color: var(--red); }
  .metric-val.green { color: var(--green); }

  /* DETAIL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,9,15,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .overlay.active { display: flex; }
  .detail {
    width: 100%;
    max-width: 720px;
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 16px 48px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.06) inset;
    display: flex; flex-direction: column; gap: 18px;
  }
  .detail-head { display: flex; justify-content: space-between; align-items: flex-start; }
  .detail-close {
    background: rgba(255,255,255,0.06);
    color: var(--txt-1);
    border: none; border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 700;
  }
  .detail-close:hover { background: var(--red-soft); color: var(--red); }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background: var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .detail-cell {
    padding: 12px 16px;
    background: linear-gradient(180deg, var(--bg-3), var(--bg-2));
    display: flex; flex-direction: column; gap: 4px;
  }
  .detail-cell .k {
    font-size: 9px; color: var(--txt-3); letter-spacing: 0.14em;
    text-transform: uppercase; font-weight: 700;
  }
  .detail-cell .v { font-size: 16px; color: var(--txt-0); font-weight: 700; }
  .detail-note {
    font-size: 13px;
    color: var(--txt-1);
    line-height: 1.5;
    background: rgba(0,0,0,0.25);
    padding: 14px 18px;
    border-radius: 12px;
  }
  .ticket {
    background: linear-gradient(135deg, rgba(20,232,122,0.16), rgba(77,214,255,0.16));
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 0 0 1px rgba(20,232,122,0.28) inset;
    display: flex; flex-direction: column; gap: 10px;
  }
  .ticket.short {
    background: linear-gradient(135deg, rgba(255,77,109,0.16), rgba(180,120,255,0.16));
    box-shadow: 0 0 0 1px rgba(255,77,109,0.28) inset;
  }
  .ticket-head {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--txt-1);
  }
  .ticket-line { font-size: 16px; font-weight: 700; color: var(--txt-0); }
  .ticket-meta { display: flex; gap: 14px; font-size: 11px; color: var(--txt-2); flex-wrap: wrap; }
  .ticket-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn {
    flex: 1;
    padding: 10px 14px;
    border: none; border-radius: 10px;
    font-family: inherit; font-weight: 700; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
  }
  .btn-primary { background: linear-gradient(180deg, #14e87a, #0fb960); color: #07090f; }
  .btn-primary.short { background: linear-gradient(180deg, #ff4d6d, #d12b4d); color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.06); color: var(--txt-1); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--txt-3);
    font-size: 14px;
  }

  .foot {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 4px 0;
    color: var(--txt-3);
    font-size: 10px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->

function fmtPct(v) {
  if (v == null) return "-";
  const sign = v >= 0 ? "+" : "";
  return sign + v.toFixed(2) + "%";
}
function fmtNum(v, dec=2) {
  if (v == null) return "-";
  // Defensive: handle strings and objects gracefully (was throwing on m.structuralStop = {symbol, predicate, price})
  if (typeof v === 'object') v = v.price || v.value || NaN;
  const n = typeof v === 'number' ? v : parseFloat(v);
  if (!isFinite(n)) return "-";
  return n.toFixed(dec);
}
function scoreClass(s) {
  if (s >= 10) return "high";
  if (s >= 7)  return "mid";
  return "low";
}

// =============================================================================
// ENTRY TIMING ENGINE
// Computes, per candidate: trigger / stop / TP / where spot is in the move.
// Returns a verdict that drives the card's prominent timing badge.
// =============================================================================
function getEntryTiming(c) {
  const isCall = c.direction === "CALL";
  const trigger = isCall ? c.priorHigh : c.priorLow;
  const stop    = isCall ? c.todayLow  : c.todayHigh;
  const r       = Math.abs(trigger - stop);
  const tp1     = isCall ? trigger + r   : trigger - r;
  const spot    = c.spot;

  // How far past trigger? in R units (1R = trigger->stop distance)
  // Positive = in the direction of the trade (good)
  // Negative = below trigger for CALL, above for PUT (still waiting)
  const directional = isCall ? (spot - trigger) : (trigger - spot);
  const rMultiple = r > 0 ? directional / r : 0;

  // Distance to trigger as % of spot
  const distPct = spot > 0 ? Math.abs(spot - trigger) / spot * 100 : 0;

  // Stopped out?  (spot past stop in wrong direction)
  const stoppedOut = isCall ? (spot < stop) : (spot > stop);

  let verdict, color, msg, sub;
  if (stoppedOut) {
    verdict = "INVALID"; color = "gray";
    msg = "Setup invalidated"; sub = `Past ${isCall ? "stop low" : "stop high"} ${fmtNum(stop)}`;
  } else if (rMultiple < -0.15) {
    // More than 15% of R below trigger -> still waiting for break
    verdict = "WAIT"; color = "amber";
    msg = "Wait for trigger"; sub = `${fmtPct(distPct)} below ${fmtNum(trigger)}`;
  } else if (rMultiple < 0.15) {
    // Within ±15% of R from trigger -> sweet spot, fire now
    verdict = "ENTER NOW"; color = "green";
    msg = "Trigger zone live"; sub = `Spot ${fmtNum(spot)} vs trigger ${fmtNum(trigger)}`;
  } else if (rMultiple < 0.5) {
    // 15-50% into the move -> still good RR
    verdict = "STILL GOOD"; color = "green";
    msg = `${rMultiple.toFixed(2)}R into move`; sub = `Entry OK, RR ${(2 - rMultiple).toFixed(1)} to TP2`;
  } else if (rMultiple < 1.0) {
    // 50%-100% into the move -> chase risk
    verdict = "CHASE RISK"; color = "amber";
    msg = `${rMultiple.toFixed(2)}R extended`; sub = `RR shrunk - tight stop required`;
  } else {
    // Past TP1 -> missed
    verdict = "MISSED"; color = "red";
    msg = "Past TP1"; sub = `${rMultiple.toFixed(2)}R extended - chase = bad RR`;
  }

  return { verdict, color, msg, sub, trigger, stop, tp1, rMultiple, distPct, isCall };
}

// =============================================================================
// CANDLE COUNTDOWN
// Time remaining in current candle. Defaults to Daily (4 PM ET close on RTH).
// =============================================================================
function getCandleCountdown(tf) {
  // Get current time in ET
  const now = new Date();
  const etStr = now.toLocaleString("en-US", { timeZone: "America/New_York" });
  const et = new Date(etStr);
  const dow = et.getDay(); // Sun=0
  const h = et.getHours();
  const m = et.getMinutes();
  const s = et.getSeconds();

  // Weekend? Next candle is Monday 9:30 AM
  if (dow === 0 || dow === 6) {
    return { label: "Weekend", remaining: "—" };
  }

  // For Daily: close at 4:00 PM ET
  // For 4HR (RTH): closes at 1:30 PM and 4:00 PM
  if (tf === "4HR" || tf === "4H") {
    let target;
    if (h < 13 || (h === 13 && m < 30)) {
      target = new Date(et); target.setHours(13, 30, 0, 0);
    } else if (h < 16) {
      target = new Date(et); target.setHours(16, 0, 0, 0);
    } else {
      // After hours -> next day 1:30 PM
      target = new Date(et); target.setDate(target.getDate() + (dow === 5 ? 3 : 1));
      target.setHours(13, 30, 0, 0);
    }
    return formatCountdown(target - et);
  }

  // Default Daily: 4:00 PM ET close
  let target = new Date(et);
  if (h >= 16) {
    // After close -> tomorrow 4 PM (Friday -> Monday)
    target.setDate(target.getDate() + (dow === 5 ? 3 : 1));
  }
  target.setHours(16, 0, 0, 0);
  const ms = target - et;
  return formatCountdown(ms);
}

function formatCountdown(ms) {
  if (ms <= 0) return { label: "—", remaining: "—" };
  const totalMin = Math.floor(ms / 60000);
  const hours = Math.floor(totalMin / 60);
  const mins  = totalMin % 60;
  const secs  = Math.floor((ms % 60000) / 1000);
  let remaining;
  if (hours > 0) remaining = `${hours}h ${String(mins).padStart(2,"0")}m`;
  else if (mins >= 10) remaining = `${mins}m ${String(secs).padStart(2,"0")}s`;
  else remaining = `${mins}:${String(secs).padStart(2,"0")}`;
  // Label shows "next close in"
  return { label: "Daily close", remaining };
}

function renderStats() {
  const cands = scan.candidates || [];
  const longs  = cands.filter(c => c.direction === "CALL").length;
  const shorts = cands.filter(c => c.direction === "PUT").length;
  const cleared = cands.filter(c => !EARNINGS_BLOCK.has(c.ticker)).length;
  const topScore = cands.reduce((m, c) => Math.max(m, c.score || 0), 0);
  const stats = [
    { k: "Candidates", v: cands.length, cls: "" },
    { k: "Calls", v: longs, cls: "green" },
    { k: "Puts", v: shorts, cls: "red" },
    { k: "Earnings clear", v: cleared, cls: "aqua" },
    { k: "Top score", v: topScore, cls: "" },
    { k: "Universe", v: scan.universeSize || "-", cls: "" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

function renderFilters() {

  }).join("");
  document.querySelectorAll(".filter").forEach(el => {
    el.addEventListener("click", () => {
      activeFilter = el.dataset.id;
      renderFilters();
      renderGrid();

}

// Apr 30 2026 — freshness classifier addresses AB's WFC/UNH/MS pain:
// scanner was showing setups where trigger already fired & TP was hit.
// Returns { state, distPct, label, color, advice }
function computeFreshness(c, t) {
  if (!c || !t || !t.trigger || !t.stop) return { state: "unknown", label: "—", color: "" };
  const spot = c.spot || 0;
  const trigger = t.trigger;
  const tp1 = t.tp1;
  const isCall = c.direction === "CALL";
  // Distance from spot to trigger as % of trigger price
  // isCall: positive = past trigger up; isPut: positive = past trigger down
  const distPct = isCall
    ? ((spot - trigger) / trigger) * 100
    : ((trigger - spot) / trigger) * 100;
  // Has TP already hit?
  const tpHit = tp1 != null && (isCall ? spot >= tp1 : spot <= tp1);
  // Daily Strat 3 = today's range fully outside prior bar's range = expansion / day-1 caution
  const todayRange = (c.todayHigh - c.todayLow) || 0;
  const priorRange = (c.priorHigh - c.priorLow) || 0;
  const isStrat3Today = todayRange > priorRange * 1.2 &&
                       (c.todayHigh > c.priorHigh && c.todayLow < c.priorLow);

  if (tpHit)        return { state: "past_tp", label: "✅ TP HIT", color: "lvl-aqua", advice: "Move done — find next setup" };
  if (isStrat3Today) return { state: "expansion", label: "⛔ EXPANSION DAY", color: "lvl-gray", advice: "Strat 3 range expansion — pause, expect retrace tomorrow" };
  if (distPct < -1)  return { state: "fresh",    label: "🟢 FRESH", color: "lvl-green", advice: `${(-distPct).toFixed(2)}% from trigger` };
  if (distPct < 1)   return { state: "armed",    label: "🟡 ARMED", color: "lvl-aqua", advice: "Trigger zone live, enter on confirmation" };
  if (distPct < 3)   return { state: "chasable", label: "🟡 CHASABLE", color: "lvl-aqua", advice: `Already ${distPct.toFixed(2)}% past trigger — wait for pullback` };
  if (distPct < 6)   return { state: "stale",    label: "🔴 STALE", color: "lvl-red", advice: `${distPct.toFixed(2)}% past trigger — needs pullback for clean entry` };
  return { state: "exhausted", label: "⛔ EXHAUSTED", color: "lvl-gray", advice: `${distPct.toFixed(2)}% past trigger — too late, find next` };
}

// May 1 v6: dedup same-ticker different-direction entries.
// AB caught a ticker appearing twice (CALL + PUT) on the WP page.
// When this happens, keep the higher-scored direction — picks the cleaner setup.
function dedupByTicker(cands) {
  const seen = new Map();   // ticker -> best candidate
  for (const c of cands) {
    if (!c || !c.ticker) continue;
    const existing = seen.get(c.ticker);
    if (!existing) {
      seen.set(c.ticker, c);
      continue;
    }
    // Pick the one with higher score; on tie pick CALL (long bias preferred for momentum)
    const exScore = existing.score || 0;
    const cScore  = c.score || 0;
    if (cScore > exScore) seen.set(c.ticker, c);
    else if (cScore === exScore && c.direction === "CALL" && existing.direction === "PUT") {
      seen.set(c.ticker, c);
    }
  }
  return Array.from(seen.values());
}

function renderGrid() {
  const cands = dedupByTicker(scan.candidates || []);
  const filter = FILTERS.find(f => f.id === activeFilter) || FILTERS[0];
  const filtered = cands.filter((c, i) => filter.test(c, i));
  if (!filtered.length) {
    document.getElementById("grid").innerHTML = `<div class="empty">No candidates match this filter.</div>`;
    return;
  }
  document.getElementById("grid").innerHTML = filtered.map((c, i) => {
    const isCall = c.direction === "CALL";
    const isEarnings = EARNINGS_BLOCK.has(c.ticker);
    const sectorTier = c.sectorTier || "neutral";
    const sectorMomDisplay = c.sectorMom != null ? fmtPct(c.sectorMom) : "";
    const t = getEntryTiming(c);
    const cd = getCandleCountdown("Daily");
    const icon = t.color === "green" ? "🟢" : t.color === "amber" ? "🟡" : t.color === "red" ? "🔴" : "⚪";
    const fresh = computeFreshness(c, t);

    // Proximity bar layout: map stop -> trigger -> tp1 to a 0-100% scale
    // stop at left, trigger in middle (50%), tp1 at right (100%)
    // spot position: clamp into 0-100%
    const lo = Math.min(t.stop, t.tp1, t.trigger, c.spot);
    const hi = Math.max(t.stop, t.tp1, t.trigger, c.spot);
    const span = Math.max(0.01, hi - lo);
    const pct = (val) => Math.max(0, Math.min(100, ((val - lo) / span) * 100));
    const triggerPct = pct(t.trigger);
    const stopPct = pct(t.stop);
    const tp1Pct = pct(t.tp1);
    const spotPct = pct(c.spot);
    const stopBar = isCall
      ? `left:${pct(t.stop)}%; right:${100 - triggerPct}%`
      : `left:${triggerPct}%; right:${100 - pct(t.stop)}%`;
    const tpBar = isCall
      ? `left:${triggerPct}%; right:${100 - tp1Pct}%`
      : `left:${tp1Pct}%; right:${100 - triggerPct}%`;

    return `
      <div class="card ${isCall ? "long" : "short"} ${isEarnings ? "earnings-block" : ""}" data-idx="${cands.indexOf(c)}">
        <div class="card-head">
          <div>
            <div class="ticker mono">${c.ticker}</div>
            <div style="font-size:11px; color: var(--txt-3); margin-top:4px;">$${fmtNum(c.spot)} <span style="color: ${c.momentum5d >= 0 ? "var(--green)" : "var(--red)"}; margin-left:4px;">${fmtPct(c.momentum5d)} 5d</span></div>
          </div>
          <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end;">
            <span class="dir-pill ${isCall ? "call" : "put"}">${c.direction}</span>
            <span class="lvl-tfpill ${fresh.color}" style="padding: 4px 10px; font-size:11px;" title="${fresh.advice}">${fresh.label}</span>
            <div class="score-badge"><span class="score-num ${scoreClass(c.score)} mono">${c.score}</span><span class="score-lbl">Score</span></div>
          </div>
        </div>

        <div class="timing ${t.color}">
          <span class="timing-icon">${icon}</span>
          <div class="timing-text">
            <span class="timing-verdict">${t.verdict}</span>
            <span class="timing-msg">${t.msg}</span>
            <span class="timing-sub">${t.sub}</span>
          </div>
          <div class="timing-countdown">
            <span class="timing-countdown-val mono" data-countdown="Daily">${cd.remaining}</span>
            <span class="timing-countdown-lbl">${cd.label}</span>
          </div>
        </div>

        <div>
          <div class="prox">
            <div class="prox-stop"  style="${stopBar}"></div>
            <div class="prox-tp"    style="${tpBar}"></div>
            <div class="prox-trigger" style="left:${triggerPct}%"></div>
            <div class="prox-spot" style="left:${spotPct}%"></div>
          </div>
          <div class="prox-labels">
            <span>${isCall ? "Stop " + fmtNum(t.stop) : "Stop " + fmtNum(t.stop)}</span>
            <span style="color: var(--aqua);">Trig ${fmtNum(t.trigger)}</span>
            <span>TP1 ${fmtNum(t.tp1)}</span>
          </div>
        </div>

        <div>
          <span class="pattern">${c.pattern}</span>
        </div>
        <div class="metrics">
          <div class="metric"><span class="metric-key">Prior Hi</span><span class="metric-val mono">${fmtNum(c.priorHigh)}</span></div>
          <div class="metric"><span class="metric-key">Prior Lo</span><span class="metric-val mono">${fmtNum(c.priorLow)}</span></div>
          <div class="metric"><span class="metric-key">Today Hi</span><span class="metric-val mono">${fmtNum(c.todayHigh)}</span></div>
          <div class="metric"><span class="metric-key">Today Lo</span><span class="metric-val mono">${fmtNum(c.todayLow)}</span></div>
        </div>
        <div class="tags">
          <span class="tag swing">SWING</span>
          <span class="tag sector">${c.sector || "-"} ${sectorMomDisplay}</span>
          <span class="tag ${sectorTier}">${sectorTier}</span>
          ${isEarnings ? '<span class="tag block">⚠ Earnings</span>' : ""}
          ${c.emaStackBull ? '<span class="tag preferred">EMA Bull</span>' : ""}
        </div>
        ${c.note ? `<div class="note">${c.note}</div>` : ""}
      </div>
    `;
  }).join("");
  document.querySelectorAll(".card").forEach(el => {
    el.addEventListener("click", () => openDetail(parseInt(el.dataset.idx)));
  });
}

function openDetail(idx) {
  const c = scan.candidates[idx];
  if (!c) return;
  const isCall = c.direction === "CALL";
  // Compute trigger / stop / TP from the pattern
  const trigger = isCall ? c.priorHigh : c.priorLow;
  const stop    = isCall ? c.todayLow  : c.todayHigh;
  const r       = Math.abs(trigger - stop);
  const tp1     = isCall ? trigger + r : trigger - r;
  const tp2     = isCall ? trigger + 2*r : trigger - 2*r;
  const isEarnings = EARNINGS_BLOCK.has(c.ticker);

  document.getElementById("detail").innerHTML = `
    <div class="detail-head">
      <div>
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
          <span class="ticker mono">${c.ticker}</span>
          <span class="dir-pill ${isCall ? "call" : "put"}">${c.direction}</span>
          ${isEarnings ? '<span class="tag block">⚠ Earnings blocked</span>' : ""}
        </div>
        <div style="font-size: 13px; color: var(--txt-2);">${c.pattern} · Score <span class="${scoreClass(c.score)}" style="font-weight:700;">${c.score}</span> · ${c.sector || ""}</div>
      </div>
      <button class="detail-close" onclick="closeDetail()">×</button>
    </div>

    <div class="detail-grid">
      <div class="detail-cell"><span class="k">Spot</span><span class="v mono">$${fmtNum(c.spot)}</span></div>
      <div class="detail-cell"><span class="k">5-Day Mom</span><span class="v mono ${c.momentum5d>=0?"":""}">${fmtPct(c.momentum5d)}</span></div>
      <div class="detail-cell"><span class="k">EMA 9 / 21</span><span class="v mono">${fmtNum(c.ema9)} / ${fmtNum(c.ema21)}</span></div>
      <div class="detail-cell"><span class="k">EMA Stack</span><span class="v">${c.emaStackBull ? "BULL ✓" : "—"}</span></div>

async function fetchStrategyPick(c, isCall) {
  // First: fetch IV percentile (parallel with picker call would be cleaner but
  // strategyPicker NEEDS ivPercentile to avoid "IV unknown" fallback)
  let ivPercentile = c.ivPercentile || null;
  if (!ivPercentile) {
    try {
      const ivResp = await fetch(`/api/iv/${encodeURIComponent(c.ticker)}`);
      if (ivResp.ok) {
        const ivData = await ivResp.json();
        if (ivData.ok && ivData.ivPercentile != null) {
          ivPercentile = ivData.ivPercentile;
          // Annotate the candidate so subsequent calls reuse it
          c.ivPercentile = ivPercentile;
          c.atmIV = ivData.atmIV;
        }
      }
    } catch (e) { /* silent — fall through to picker, which will use unknown fallback */ }
  }

  const setup = {
    ticker:        c.ticker,
    direction:     isCall ? "LONG" : "SHORT",
    score:         c.score,
    catalyst:      c.catalyst || (EARNINGS_BLOCK.has(c.ticker) ? "EARNINGS" : "NONE"),
    ivPercentile:  ivPercentile,
    atmIV:         c.atmIV || null,
    rangeBoundExpected: false,
    holdDays:      c.holdDays || (c.timeframe === "Daily" ? 5 : 1),
  };
  try {
    const r = await fetch("/api/strategy-pick", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ ...setup, optionsLevel: 3 }),
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const pick = await r.json();
    renderStrategyPick(pick, setup);
  } catch (e) {
    document.getElementById("strategy-pick-section").style.display = "block";
    document.getElementById("strategy-pick-body").innerHTML =
      `<div style="font-size:11px; color: var(--txt-3);">Strategy picker unavailable: ${e.message}</div>`;
  }
}

      tp.tp1Trim       ? `<span><span class="mk">@ TP1</span><span class="mv">${tp.tp1Trim}</span></span>` : "",
      tp.tp2Trim       ? `<span><span class="mk">@ TP2</span><span class="mv">${tp.tp2Trim}</span></span>` : "",
      tp.tp3OrTrail    ? `<span><span class="mk">@ TP3</span><span class="mv">${tp.tp3OrTrail}</span></span>` : "",
      tp.managementRule? `<span><span class="mk">CLOSE</span><span class="mv">${tp.managementRule}</span></span>` : "",
      tp.stopRule      ? `<span><span class="mk">STOP RULE</span><span class="mv">${tp.stopRule}</span></span>` : "",
    ].filter(Boolean).join("");
    tradePlanHtml = `
      <div style="margin-top:14px; padding-top:14px; border-top: 1px solid rgba(255,255,255,0.06);">
        <div style="font-size:11px; color: var(--green); font-weight:700; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:8px;">📋 Trim / Runner Plan</div>
        <div class="ticket-meta mono" style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;">${lines}</div>

  }
}

async function fetchIronCondor(underlying, dte) {
  const sec = document.getElementById("ic-plan-section");
  if (!sec) return;
  sec.innerHTML = `<div style="margin-top:14px; font-size:11px; color: var(--txt-3);">⏳ Fetching live ${underlying} chain for iron condor legs...</div>`;
  // Compute target expiry: today + dte days, formatted YYYY-MM-DD
  const now = new Date();
  now.setDate(now.getDate() + dte);
  const expiry = now.toISOString().slice(0, 10);
  try {
    const r = await fetch(`/api/iron-condor/${underlying}?expiry=${expiry}`);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const d = await r.json();
    if (!d.ok || !d.plan?.ok) {
      sec.innerHTML = `<div style="margin-top:14px; font-size:11px; color: var(--txt-3);">IC builder: ${d.plan?.reason || d.error || "unable to build"}</div>`;

  } catch (e) {
    sec.innerHTML = `<div style="margin-top:14px; font-size:11px; color: var(--red);">IC fetch failed: ${e.message}</div>`;
  }
}

// Get the STRATUM_SECRET (prompt once, cache in localStorage like the classic scanner)
function getStratumSecret() {
  let s = localStorage.getItem("stratumSecret");
  if (!s) {
    s = prompt("Enter STRATUM_SECRET (one-time, stored in this browser only):");
    if (s) localStorage.setItem("stratumSecret", s);

}

// =============================================================================
// PUBLIC.COM FIRE (May 1 2026) — cash account, no PDT, used Friday for day trades
// AB: "PDT day, can't use TS, need Public on cards"
// =============================================================================
//
// Defaults to OPTION fire if the card has a resolved contract symbol; otherwise
// falls back to EQUITY (stock) at trigger price. Always 1 ct/sh, LIMIT, DAY.
// AB can edit qty/price in the confirm dialog.
async function dispatchToPublic(payload, btn) {
  const orig = btn.textContent;
  // payload contract: { ticker, direction, contract?, optionEntry?, trigger, stop?, tp1?, tp2? }
  const ticker = payload.ticker;
  const direction = (payload.direction || '').toUpperCase();
  const isLong = direction === 'CALL' || direction === 'LONG' || direction === 'BULLISH';
  const side = isLong ? 'BUY' : 'SELL';

  // Choose option (preferred for leverage) or equity. Public requires OPRA-without-spaces for options.
  let symbol = payload.contract || payload.ticker;
  let isOption = !!payload.contract;
  let priceHint = isOption ? (payload.optionEntry || payload.optionMid || payload.trigger) : payload.trigger;

  if (!priceHint || !isFinite(priceHint)) {
    btn.textContent = '❌ no price';
    setTimeout(() => { btn.textContent = orig; }, 2000);
    return;
  }

  // Default qty: 1 contract for options (≈100 shares exposure), 1 share for equity
  let qty = isOption ? 1 : 1;

  // Confirm dialog — short, scannable
  const kind = isOption ? `1 ct ${symbol}` : `1 sh ${ticker}`;
  const confirmed = confirm(
    `📱 PUBLIC.COM ORDER — CASH ACCOUNT\n\n` +
    `${side} ${kind} @ $${priceHint.toFixed(2)} LIMIT (DAY)\n\n` +
    `${isOption ? 'OPTIONS' : 'EQUITY'} order — Friday day trade\n\n` +
    `Confirm placement?`
  );
  if (!confirmed) return;

  btn.textContent = "Placing on Public...";
  btn.disabled = true;

  try {
    const resp = await fetch("/api/public/order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        symbol: symbol,
        side: side,
        quantity: qty,
        orderType: "LIMIT",
        limitPrice: priceHint,
        timeInForce: "DAY",
        instrumentType: isOption ? "OPTION" : "EQUITY",
        openCloseIndicator: side === "BUY" ? "OPEN" : "CLOSE",
      }),
    });
    const data = await resp.json();
    if (data && data.ok && data.orderId) {
      btn.textContent = `✓ Public ${data.orderId.slice(0,8)}`;
      btn.style.background = "linear-gradient(180deg, #14e87a, #0fb960)";
      btn.style.color = "#07090f";
      btn.disabled = false;
    } else {
      const errTxt = (data && data.error) ? String(data.error).slice(0,80) : "unknown error";
      btn.textContent = "❌ " + errTxt;
      btn.disabled = false;
      setTimeout(() => { btn.textContent = orig; }, 5000);
      console.error("Public order error:", data);
    }
  } catch (e) {
    btn.textContent = "❌ " + e.message.slice(0,40);
    btn.disabled = false;
    setTimeout(() => { btn.textContent = orig; }, 5000);
  }
}
window.dispatchToPublic = dispatchToPublic;

// Convenience wrapper for SCAN cards (uses scan.candidates[idx])

    ticker: c.ticker,
    direction: c.direction,
    contract: c.contract,
    optionEntry: c.optionEntry || c.optionMid,
    trigger: t.trigger,
    stop: t.stop,
    tp1: t.tp1,
  }, btn);
}

// MOVERS dispatcher — uses moversData[idx]
async function dispatchMoverToPublic(idx, btn) {

// TOMORROW (radar) dispatcher — fires the setup card
async function dispatchRadarToPublic(ticker, btn) {

    contract: setup.contract,
    optionEntry: setup.optionEntry,
    trigger: typeof setup.trigger === 'number' ? setup.trigger : setup.spot,
    stop: setup.stop,
    tp1: setup.target,
  }, btn);
}

async function dispatchToTitan(idx, btn) {
  const c = scan.candidates[idx];
  const isCall = c.direction === "CALL";
  const trigger = isCall ? c.priorHigh : c.priorLow;
  const stop    = isCall ? c.todayLow  : c.todayHigh;
  const r       = Math.abs(trigger - stop);
  const tp1     = isCall ? trigger + r : trigger - r;
  const tp2     = isCall ? trigger + 2*r : trigger - 2*r;
  const conviction = c.score >= 12 ? "high" : c.score >= 9 ? "medium" : "low";
  const live = account === "LIVE";

  // Bigger, scarier confirm for LIVE; cleaner for SIM
  const banner = live
    ? `🚨 LIVE ORDER — REAL MONEY 🚨\n\nThis will place a working order in your LIVE account.\n`
    : `🧪 SIM ORDER (paper)\n`;
  if (!confirm(`${banner}\n${isCall ? "BUY" : "SHORT"} ${c.ticker} 2 ct @ ${trigger.toFixed(2)} LMT\nStop: ${stop.toFixed(2)} | TP1: ${tp1.toFixed(2)} | TP2: ${tp2.toFixed(2)}\nConviction: ${conviction.toUpperCase()}\nPattern: ${c.pattern}\n\n${live ? "Confirm LIVE order placement?" : "Place SIM test order?"}`)) return;

  const secret = getStratumSecret();
  if (!secret) {
    btn.textContent = "❌ Secret required";
    setTimeout(() => { btn.textContent = "🎟️ Send to Titan"; }, 2000);
    return;
  }

  const orig = btn.textContent;
  btn.textContent = "Placing...";
  btn.disabled = true;

  try {
    const resp = await fetch("/api/scanner-fire", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-stratum-secret": secret,
      },
      body: JSON.stringify({
        ticker:    c.ticker,
        direction: isCall ? "BULLISH" : "BEARISH",
        // Don't pass entry/stop/tp1/tp2 - server will auto-resolve option contract
        // and override these with option-premium-based bracket. Pass them as
        // structuralStop hints so resolver knows the underlying levels.
        qty:       2,
        live:      live,
        orderType: "OPTION",  // server resolves to OPRA contract
        tradeType: "SWING",   // SCAN tab is swing setups (Daily Strat patterns)
        signalMeta: {
          strategy: c.pattern,
          score:    c.score,
          underlyingTrigger: trigger,
          underlyingStop:    stop,
        },
      }),
    });
    const data = await resp.json();
    if (data.ok) {
      btn.textContent = `✓ ${live ? "LIVE" : "SIM"} order placed`;
      btn.style.background = "linear-gradient(180deg, #14e87a, #0fb960)";
      btn.style.color = "#07090f";
      // Show the order ID + go-to-Titan hint
      const detail = document.getElementById("strategy-pick-body");
      if (detail) {
        const note = document.createElement("div");
        note.style.cssText = "margin-top:14px; padding:12px; border-radius:10px; background: rgba(20,232,122,0.12); border: 1px solid rgba(20,232,122,0.32);";
        note.innerHTML = `<div style="font-size:12px; color: var(--green); font-weight:700; margin-bottom:4px;">✓ Order Placed in ${live ? "LIVE" : "SIM"} Account</div><div style="font-size:11px; color: var(--txt-1);">${data.message || ""}</div>${data.orderID ? `<div style="font-size:10px; color: var(--txt-3); margin-top:4px;">Order ID: <span class="mono">${data.orderID}</span></div>` : ""}`;
        detail.appendChild(note);
      }
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ""; btn.style.color = ""; }, 4000);
    } else {
      const errMsg = (data.error || "failed").slice(0, 60);
      btn.textContent = "❌ " + errMsg;
      btn.style.background = "var(--red-soft)";
      btn.style.color = "var(--red)";
      // If unauthorized, clear stored secret so next click prompts again
      if (resp.status === 401) localStorage.removeItem("stratumSecret");
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ""; btn.style.color = ""; }, 4000);
    }
  } catch (e) {
    btn.textContent = "❌ " + e.message.slice(0, 40);
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 3000);
  }
}

  const stopPrice = (typeof m.structuralStop === 'object' && m.structuralStop !== null)
    ? m.structuralStop.price

  const trigger = m.triggerPrice || (isCall ? m.high : m.low);
  const stop    = stopPrice || (isCall ? m.low  : m.high);

      <div class="detail-cell"><span class="k">Low</span><span class="v mono" style="color: var(--red);">${fmtNum(m.low)}</span></div>

        <span><span class="mk">TP2</span><span class="mv" style="color: var(--green);">$${fmtNum(m.optionTp2)}</span></span>

function copyMoverTicket(idx) {
  const m = movers.movers[idx];
  const isUp = m.pctChange > 0;
  const txt = m.optionSymbol
    ? `BUY ${m.ticker} ${m.expiry} ${m.atmStrike}${isUp?'C':'P'} @ ~$${m.optionMid.toFixed(2)} LMT | stop $${m.optionStop.toFixed(2)} | tp $${m.optionTp1.toFixed(2)} | sym ${m.optionSymbol}`
    : `${isUp?'BUY':'SHORT'} ${m.ticker} @ ${m.triggerPrice?.toFixed(2) || (isUp?m.high:m.low).toFixed(2)} | stop ${(m.structuralStop || (isUp?m.low:m.high)).toFixed(2)} | tp ${m.stockTp1?.toFixed(2) || ''}`;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = event.target;
    const old = btn.textContent;
    btn.textContent = "Copied ✓";
    setTimeout(() => btn.textContent = old, 1200);
  });
}

async function fireMoverOrder(idx, btn) {
  const m = movers.movers[idx];
  const isUp = m.pctChange > 0;
  const live = account === "LIVE";
  const hasContract = !!m.optionSymbol;

  const banner = live
    ? `🚨 LIVE ORDER — REAL MONEY 🚨\n\n`
    : `🧪 SIM ORDER (paper)\n`;
  const ticketLine = hasContract
    ? `BUY ${m.ticker} ${m.expiry} ${m.atmStrike}${isUp?'C':'P'} @ ~$${m.optionMid.toFixed(2)}`
    : `${isUp?'BUY':'SHORT'} ${m.ticker} @ ${(m.triggerPrice || m.last).toFixed(2)}`;

  if (!confirm(`${banner}\n${ticketLine}\nQty: 2 ct\n${live ? "Confirm LIVE order?" : "Place SIM test order?"}`)) return;

  const secret = getStratumSecret();
  if (!secret) { btn.textContent = "❌ Secret required"; return; }

  const orig = btn.textContent;
  btn.textContent = "Placing...";
  btn.disabled = true;

  const payload = hasContract ? {
    ticker:     m.ticker,
    symbol:     m.optionSymbol,
    direction:  isUp ? "BULLISH" : "BEARISH",
    entry:      m.optionEntry,
    stop:       m.optionStop,
    tp1:        m.optionTp1,
    tp2:        m.optionTp2,
    qty:        2,
    live:       live,
    orderType:  "OPTION",
  } : (function() {
    const sp = (typeof m.structuralStop === 'object' && m.structuralStop !== null) ? m.structuralStop.price : m.structuralStop;
    return {
      ticker:     m.ticker,
      direction:  isUp ? "BULLISH" : "BEARISH",
      entry:      m.triggerPrice || (isUp ? m.high : m.low),
      stop:       sp || (isUp ? m.low : m.high),
      tp1:        m.stockTp1 || ((isUp ? m.high : m.low) + (isUp ? 1 : -1) * Math.abs(m.high - m.low)),
      tp2:        m.stockTp2 || null,
      qty:        2,
      live:       live,
      orderType:  "STOCK",
      // pass the structural stop object too so orderExecutor can use it for activation rules
      structuralStop: (typeof m.structuralStop === 'object') ? m.structuralStop : null,
    };
  })();

  try {
    const resp = await fetch("/api/scanner-fire", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-stratum-secret": secret },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    const detailEl = document.getElementById("detail");
    if (data.ok) {
      btn.textContent = `✓ ${live ? "LIVE" : "SIM"} placed`;
      btn.style.background = "linear-gradient(180deg, #14e87a, #0fb960)";
      btn.style.color = "#07090f";
      // Surface tick-rounding info if any prices were adjusted
      if (data.rounded && detailEl) {
        const note = document.createElement("div");
        note.style.cssText = "margin-top:10px; padding:10px; border-radius:8px; background: rgba(255,184,77,0.10); border: 1px solid rgba(255,184,77,0.32); font-size:11px; color: var(--amber);";
        note.innerHTML = `⚡ Tick-rounded: ${Object.entries(data.rounded).map(([k,v]) => `${k} ${v.from}→${v.to}`).join(' · ')}`;
        detailEl.appendChild(note);
      }
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ""; btn.style.color = ""; }, 4000);
    } else {
      btn.textContent = "❌ " + (data.error || "fail").slice(0, 60);
      btn.style.background = "var(--red-soft)";
      btn.style.color = "var(--red)";
      // Show full TS rejection detail inline for debugging
      if (detailEl) {
        const note = document.createElement("div");
        note.style.cssText = "margin-top:10px; padding:10px; border-radius:8px; background: rgba(255,77,109,0.10); border: 1px solid rgba(255,77,109,0.32); font-size:11px; font-family: 'JetBrains Mono', monospace; color: var(--red); word-break: break-all;";
        note.innerHTML = `<strong>❌ ${data.error || "fail"}</strong>${data.tsResponse ? `<div style="color: var(--txt-3); font-size: 10px; margin-top: 6px;">${JSON.stringify(data.tsResponse).slice(0, 300)}</div>` : ""}`;
        detailEl.appendChild(note);
      }
      if (resp.status === 401) localStorage.removeItem("stratumSecret");
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ""; btn.style.color = ""; }, 6000);
    }
  } catch (e) {
    btn.textContent = "❌ " + e.message.slice(0, 40);
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 3000);
  }
}

function copyDetailTicket(idx) {
  const c = scan.candidates[idx];
  const isCall = c.direction === "CALL";
  const trigger = isCall ? c.priorHigh : c.priorLow;
  const stop    = isCall ? c.todayLow  : c.todayHigh;
  const tp1     = isCall ? trigger + Math.abs(trigger - stop) : trigger - Math.abs(trigger - stop);
  const txt = `${isCall ? "BUY" : "SHORT"} ${c.ticker} @ ${trigger.toFixed(2)} | stop ${stop.toFixed(2)} | tp ${tp1.toFixed(2)} | ${c.pattern}`;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = event.target;
    const old = btn.textContent;
    btn.textContent = "Copied ✓";
    setTimeout(() => btn.textContent = old, 1200);
  });
}

// =============================================================================
function renderTabs() {
  const counts = {
    scan: scan?.candidates?.length ?? "—",
    movers: movers?.movers?.length ?? "—",
  };
  document.getElementById("tab-nav").innerHTML = TABS.map(t => {
    const isActive = t.id === activeTab;
    const cls = ["tab"];
    if (isActive) cls.push("active");
    if (t.disabled) cls.push("disabled");
    const count = counts[t.id];
    return `<div class="${cls.join(" ")}" data-tab="${t.id}">${t.label}${count !== undefined ? `<span class="badge">${count}</span>` : ""}${t.comingSoon ? `<span class="badge">soon</span>` : ""}</div>`;
  }).join("");
  document.querySelectorAll(".tab").forEach(el => {
    el.addEventListener("click", () => {
      if (el.classList.contains("disabled")) return;
      activeTab = el.dataset.tab;
      activeFilter = "all";
      localStorage.setItem("activeTab", activeTab);
      FILTERS = activeTab === "movers" ? FILTERS_MOVERS
              : activeTab === "lvl"    ? FILTERS_LVL
              : FILTERS_SCAN;
      renderTabs();
      loadActiveTab();
    });
  });
}

async function loadActiveTab() {
  // Don't re-render if the detail overlay is open - prevents click handlers from
  // being destroyed mid-interaction by the 30s auto-poll
  if (document.getElementById("overlay")?.classList?.contains("active")) {
    return;
  }
  if (activeTab === "scan")     return loadScanData();
  if (activeTab === "movers")   return loadMoversData();
  if (activeTab === "lvl")      return loadLvlData();
  if (activeTab === "tomorrow") return loadTomorrowData();
  if (activeTab === "starred")  return loadStarredData();
  document.getElementById("grid").innerHTML = `<div class="empty">Tab "${activeTab}" coming soon.</div>`;
  document.getElementById("stats").innerHTML = "";
  document.getElementById("filters").innerHTML = "";
}

// =============================================================================
// 🌅 TOMORROW tab — reads /api/setup-radar (Living EOD watchlist)
// =============================================================================
async function loadTomorrowData() {
  FILTERS = FILTERS_TOMORROW;
  try {
    if (!radarData) document.getElementById("grid").innerHTML = `<div class="empty">Loading tomorrow's setup radar...</div>`;
    const r = await fetch("/api/setup-radar", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    // Combine all states into a flat list with state markers
    const flat = [];
    (data.ready || []).forEach(x => flat.push(Object.assign({ _state: "ready" }, x)));
    (data.forming || []).forEach(x => flat.push(Object.assign({ _state: "forming" }, x)));
    (data.earningsWatch || []).forEach(x => flat.push(Object.assign({ _state: "earnings" }, x)));
    radarData = { ...data, _flat: flat };
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">Could not load setup radar: <code>${e.message}</code><br>Run an EOD scan or POST /api/setup-radar to populate.</div>`;
    document.getElementById("stats").innerHTML = "";
    document.getElementById("filters").innerHTML = "";
    return;
  }
  document.getElementById("scan-date").textContent =
    "Setup Radar · " + new Date(radarData.updatedAt || Date.now()).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  document.getElementById("meta").textContent =
    `${radarData.ready.length} ready · ${radarData.forming.length} forming · ${radarData.earningsWatch.length} earnings · ${radarData.dead.length} dead`;
  renderStatsTomorrow();
  renderFilters();
  renderTabs();
  renderGridTomorrow();
}

function renderStatsTomorrow() {
  const stats = [
    { k: "READY",     v: radarData.ready.length,         cls: "green" },
    { k: "FORMING",   v: radarData.forming.length,       cls: "aqua" },
    { k: "EARNINGS",  v: radarData.earningsWatch.length, cls: "" },
    { k: "DEAD",      v: radarData.dead.length,          cls: "red" },

const RADAR_STATE_PILLS = {
  ready:    { txt: '🔥 READY',    cls: 'lvl-green' },
  forming:  { txt: '🟡 FORMING',  cls: 'lvl-aqua' },
  earnings: { txt: '📅 EARNINGS', cls: 'lvl-gray' },
};

const RADAR_TYPE_LABELS = {
  A: 'Post-beat continuation',
  B: 'Post-miss continuation',
  C: 'Reversal bounce',
  D: 'LVL retracement',
  E: 'Strat 3-1-2 coil',
};

function renderGridTomorrow() {
  try {
    const all = radarData._flat || [];
    const filter = FILTERS.find(f => f.id === activeFilter) || FILTERS[0];
    const filtered = all.filter(r => filter.test(r));
    if (!filtered.length) {
      document.getElementById("grid").innerHTML = `<div class="empty">No setups match "${filter.label}".${all.length === 0 ? '<br><span style="font-size:11px;">Run EOD scanner to populate the radar.</span>' : ''}</div>`;
      return;
    }
    // Sort: READY first, then FORMING, then EARNINGS
    const order = { ready: 0, forming: 1, earnings: 2 };
    filtered.sort((a, b) => (order[a._state] ?? 99) - (order[b._state] ?? 99));

    document.getElementById("grid").innerHTML = filtered.map(r => {
      const pill = RADAR_STATE_PILLS[r._state] || RADAR_STATE_PILLS.forming;
      const isLong = (r.target || 0) >= (r.spot || 0);
      const dirClass = isLong ? "long" : "short";
      const dirPill = isLong ? "call" : "put";
      const dirText = isLong ? "LONG" : "SHORT";
      const starred = isStarred(r.ticker);

      // EARNINGS state cards have a different shape (date-only)
      if (r._state === "earnings") {
        return `
          <div class="card" data-radar-ticker="${r.ticker}">
            <div class="card-head">

              </div>

            ${r.action ? `<div style="font-size:12px; color: var(--txt-2); margin-top:8px;">${r.action}</div>` : ''}
          </div>
        `;
      }

      // READY/FORMING shape — full trade card
      return `
        <div class="card ${dirClass}" data-radar-ticker="${r.ticker}">
          <div class="card-head">
            <div>
              <div class="ticker mono">${r.ticker}</div>
              <div style="font-size:11px; color: var(--txt-3); margin-top:4px;">$${fmtNum(r.spot || 0)}${r.type ? ` · Type ${r.type}` : ''}</div>

              <button class="star-btn" data-ticker="${r.ticker}" onclick="event.stopPropagation();toggleStar('${r.ticker}','tomorrow')" style="background:transparent;border:none;cursor:pointer;color:${starred?'gold':'var(--txt-3)'};font-size:18px;">${starred?'★':'☆'}</button>
            </div>
          </div>

          <div class="metrics">
            ${r.trigger ? `<div class="metric"><span class="metric-key">Trigger</span><span class="metric-val mono aqua">${typeof r.trigger === 'number' ? '$'+fmtNum(r.trigger) : r.trigger}</span></div>` : ''}
            ${r.stop != null ? `<div class="metric"><span class="metric-key">Stop</span><span class="metric-val mono red">$${fmtNum(r.stop)}</span></div>` : ''}
            ${r.target != null ? `<div class="metric"><span class="metric-key">Target</span><span class="metric-val mono green">$${fmtNum(r.target)}</span></div>` : ''}
            ${r.contract ? `<div class="metric"><span class="metric-key">Contract</span><span class="metric-val mono" style="font-size:11px;">${r.contract}</span></div>` : ''}
            ${r.optionEntry != null ? `<div class="metric"><span class="metric-key">Opt Entry</span><span class="metric-val mono">$${fmtNum(r.optionEntry)}</span></div>` : ''}
            ${r.dollarRiskPerCt != null ? `<div class="metric"><span class="metric-key">$Risk/ct</span><span class="metric-val mono red">$${fmtNum(r.dollarRiskPerCt, 0)}</span></div>` : ''}

// ⭐ STARRED tab — local-only watchlist (localStorage). Pulls latest data per ticker
// =============================================================================
const STAR_STORE_KEY = "scanner_starred_v1";

function getStars() {
  try { return JSON.parse(localStorage.getItem(STAR_STORE_KEY) || "{}"); }
  catch (e) { return {}; }
}
function setStars(obj) { localStorage.setItem(STAR_STORE_KEY, JSON.stringify(obj)); }
function isStarred(ticker) { const s = getStars(); return !!s[ticker]; }
function toggleStar(ticker, source) {
  const s = getStars();
  if (s[ticker]) { delete s[ticker]; }
  else { s[ticker] = { ticker, source: source || "manual", starredAt: new Date().toISOString() }; }
  setStars(s);
  // Re-render current tab to update star button visuals
  if (typeof loadActiveTab === "function") loadActiveTab();
}
window.toggleStar = toggleStar;
window.isStarred = isStarred;

async function loadStarredData() {
  FILTERS = FILTERS_STARRED;
  const stars = getStars();
  const tickers = Object.keys(stars);

  document.getElementById("scan-date").textContent = "Starred Watchlist";
  document.getElementById("meta").textContent = `${tickers.length} starred ticker${tickers.length === 1 ? '' : 's'}`;

  if (!tickers.length) {
    document.getElementById("grid").innerHTML = `<div class="empty">No starred tickers yet.<br><span style="font-size:11px;">Click ☆ on any card in SCAN / MOVERS / LVL / TOMORROW to star it. Starred tickers persist locally on this device.</span></div>`;
    document.getElementById("stats").innerHTML = `<div class="stat"><span class="stat-key">Stars</span><span class="stat-val mono">0</span></div>`;
    document.getElementById("filters").innerHTML = "";
    return;
  }

  // Pull in parallel: setup-radar (for tomorrow data), latest scan, latest movers
  // Use existing endpoints to enrich starred tickers with whatever we know about them.
  let scanArr = [], moversArr = [], radarFlat = [];
  try {
    const [scanR, moversR, radarR] = await Promise.all([
      fetch("/api/scan-result", { cache: "no-store" }).catch(() => null),
      fetch("/api/movers", { cache: "no-store" }).catch(() => null),
      fetch("/api/setup-radar", { cache: "no-store" }).catch(() => null),
    ]);
    if (scanR && scanR.ok) {
      const j = await scanR.json();
      scanArr = (j.candidates || j.results || j || []).map(x => Object.assign({ _source: "scan" }, x));
    }
    if (moversR && moversR.ok) {
      const j = await moversR.json();
      moversArr = (j.movers || j.results || j || []).map(x => Object.assign({ _source: "movers" }, x));
    }
    if (radarR && radarR.ok) {
      const r = await radarR.json();
      [...(r.ready || []), ...(r.forming || [])].forEach(x => radarFlat.push(Object.assign({ _source: "tomorrow", _state: r.ready.includes(x) ? "ready" : "forming" }, x)));
    }
  } catch (e) { /* swallow — partial data is fine */ }

  // For each starred ticker, find the best record across sources (priority: tomorrow > scan > movers)
  const cards = tickers.map(t => {
    const tom = radarFlat.find(x => (x.ticker || x.symbol) === t);
    if (tom) return tom;
    const sc = scanArr.find(x => (x.ticker || x.symbol) === t);
    if (sc) return sc;
    const mv = moversArr.find(x => (x.ticker || x.symbol) === t);
    if (mv) return mv;
    // Fallback: stub card
    return { ticker: t, _source: "manual", _stub: true, starredAt: stars[t].starredAt };
  });

  starredCache = cards;

  renderStatsStarred();
  renderFilters();
  renderTabs();
  renderGridStarred();
}

async function loadLvlData() {
  FILTERS = FILTERS_LVL;
  try {
    if (!lvlData) document.getElementById("grid").innerHTML = `<div class="empty">Computing LVL state across universe...<br><span style="font-size:11px;">First run takes ~30s (110 tickers × 2 timeframes).</span></div>`;
    const r = await fetch("/api/lvl-scan?tfs=Daily,1H", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || "lvl-scan failed");
    // Annotate each result with derived flags used by filters
    (data.results || []).forEach(r => {
      const tfStates = Object.values(r.tfs || {}).filter(s => s && s.ok);
      r._anyEnterNow = tfStates.some(s => s.signal === 'LVL_LONG_25' || s.signal === 'LVL_SHORT_75');
      r._anyArmed    = tfStates.some(s => ['LVL_LONG_25','EARLY_LONG','LVL_SHORT_75','EARLY_SHORT','HIGH_BREAK','LOW_BREAK'].includes(s.signal));
      r._anyStopped  = tfStates.some(s => s.signal === 'STOP_HIT');
      const dirs = tfStates.map(s => s.direction).filter(d => d && d !== 'NONE');
      r._dominantDirection = dirs[0] || 'NONE';
      r._aligned = dirs.length >= 2 && dirs.every(d => d === dirs[0]);
    });
    lvlData = data;
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">
      Could not load LVL scan: <code>${e.message}</code>
    </div>`;
    return;
  }
  document.getElementById("scan-date").textContent =
    "LVL Scan · " + new Date(lvlData.timestamp).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  document.getElementById("meta").textContent =
    `${lvlData.universe} scanned · ${lvlData.summary.withSignals} active · ${lvlData.summary.aligned} aligned`;
  renderStatsLvl();
  renderFilters();
  renderTabs();
  renderGridLvl();
}

function renderGridLvl() {
  try {
  const rs = lvlData.results || [];

  filtered.sort((a, b) => {
    if (a._aligned !== b._aligned) return b._aligned - a._aligned;
    if (a._anyEnterNow !== b._anyEnterNow) return b._anyEnterNow - a._anyEnterNow;

  document.getElementById("grid").innerHTML = filtered.map((r, i) => {

    const oneHSig  = SIGNAL_PILLS[oneHState.signal]  || SIGNAL_PILLS.NONE;

        <!-- Multi-TF stacked pills -->
        <div class="lvl-tfrow">
          <div class="lvl-tfpill ${dailySig.cls}">
            <span class="lvl-tfpill-tf">D</span>
            <span class="lvl-tfpill-icon">${dailySig.icon}</span>

            <span class="lvl-tfpill-tf">1H</span>
            <span class="lvl-tfpill-icon">${oneHSig.icon}</span>

        <div class="metrics">

          <div class="metric"><span class="metric-key">D Stop</span><span class="metric-val mono red">${fmtNum(dailyState.plan.stop)}</span></div>

        </div>` : ''}

        <div class="tags">

  }
}
