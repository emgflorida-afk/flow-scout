<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stratum Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #07090f;
    --bg-1: #0d1220;
    --bg-2: #141a2e;
    --bg-3: #1c2440;
    --line: rgba(255,255,255,0.06);
    --line-bright: rgba(255,255,255,0.12);
    --txt-0: #ffffff;
    --txt-1: #c9d1e0;
    --txt-2: #8a93a8;
    --txt-3: #5a6378;
    --green: #14e87a;
    --green-soft: rgba(20, 232, 122, 0.12);
    --red: #ff4d6d;
    --red-soft: rgba(255, 77, 109, 0.12);
    --aqua: #4dd6ff;
    --aqua-soft: rgba(77, 214, 255, 0.12);
    --amber: #ffb84d;
    --amber-soft: rgba(255, 184, 77, 0.12);
    --purple: #b478ff;
    --purple-soft: rgba(180, 120, 255, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: radial-gradient(ellipse at top, #14182c 0%, #07090f 60%);
    color: var(--txt-0);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 4px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, #4dd6ff 0%, #b478ff 100%);
    display: grid; place-items: center;
    font-weight: 800; font-size: 18px; color: #07090f;
    box-shadow: 0 0 24px rgba(77, 214, 255, 0.5);
  }
  .brand-name {
    font-size: 14px; font-weight: 700; letter-spacing: 0.06em; color: var(--txt-1);
  }
  .brand-sub {
    font-size: 11px; font-weight: 500; color: var(--txt-3);
    letter-spacing: 0.16em; text-transform: uppercase;
  }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .pill-mini {
    font-size: 10px; font-weight: 600; padding: 5px 10px;
    border-radius: 999px; background: rgba(255,255,255,0.04);
    color: var(--txt-2); letter-spacing: 0.06em; text-transform: uppercase;
  }
  .pill-mini.live::before {
    content: ""; display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    margin-right: 6px; animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 1px;
    background: var(--line);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04) inset;
  }
  .stat {
    padding: 16px 20px;
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-key {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--txt-3);
  }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--txt-0); }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.aqua { color: var(--aqua); }

  /* FILTERS */
  .filters {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 4px;
  }
  .filter {
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: var(--txt-2);
    font-size: 12px; font-weight: 600;
    cursor: pointer; user-select: none;
    transition: background .15s ease, color .15s ease;
    border: 1px solid transparent;
  }
  .filter:hover { background: rgba(255,255,255,0.07); color: var(--txt-1); }
  .filter.active {
    background: linear-gradient(135deg, rgba(77,214,255,0.18), rgba(180,120,255,0.18));
    color: var(--txt-0);
    border-color: rgba(77,214,255,0.32);
    box-shadow: 0 0 16px rgba(77, 214, 255, 0.18);
  }
  .filter .count {
    margin-left: 6px;
    font-size: 10px;
    color: var(--txt-3);
    font-weight: 500;
  }
  .filter.active .count { color: var(--txt-1); }

  /* CARD GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }

  .card {
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04) inset;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    cursor: pointer;
    transition: transform .12s ease, box-shadow .15s ease;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(77,214,255,0.18) inset;
  }
  .card.long {
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 70%, rgba(20,232,122,0.04) 100%);
  }
  .card.short {
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 70%, rgba(255,77,109,0.04) 100%);
  }
  .card.earnings-block {
    box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,184,77,0.32) inset;
  }
  .card.fomc-block {
    box-shadow: 0 4px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,77,109,0.32) inset;
  }

  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .ticker {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .dir-pill {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 9px;
    border-radius: 6px;
    text-transform: uppercase;
  }
  .dir-pill.call { background: var(--green-soft); color: var(--green); }
  .dir-pill.put  { background: var(--red-soft);   color: var(--red); }

  .score-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 12px;
    border-radius: 12px;
    background: rgba(0,0,0,0.3);
    min-width: 60px;
  }
  .score-num {
    font-size: 22px; font-weight: 800; line-height: 1;
  }
  .score-num.high { color: var(--green); }
  .score-num.mid  { color: var(--amber); }
  .score-num.low  { color: var(--txt-2); }
  .score-lbl {
    font-size: 9px; color: var(--txt-3);
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-top: 2px;
  }

  .pattern {
    font-size: 12px;
    font-weight: 600;
    color: var(--txt-1);
    background: rgba(255,255,255,0.03);
    padding: 6px 10px;
    border-radius: 8px;
    display: inline-block;
    align-self: flex-start;
  }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    font-size: 11px;
  }
  .metric { display: flex; justify-content: space-between; gap: 8px; }
  .metric-key {
    color: var(--txt-3);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .metric-val {
    color: var(--txt-1);
    font-weight: 600;
    text-align: right;
  }
  .metric-val.green { color: var(--green); }
  .metric-val.red   { color: var(--red); }

  .note {
    font-size: 11px;
    color: var(--txt-2);
    line-height: 1.4;
    border-top: 1px solid var(--line);
    padding-top: 10px;
  }

  /* TIMING BADGE — the "should I fire now?" answer */
  .timing {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(0,0,0,0.25);
    box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset;
  }
  .timing.green {
    background: linear-gradient(135deg, rgba(20,232,122,0.20), rgba(20,232,122,0.06));
    box-shadow: 0 0 0 1px rgba(20,232,122,0.32) inset, 0 0 16px rgba(20,232,122,.10);
  }
  .timing.amber {
    background: linear-gradient(135deg, rgba(255,184,77,0.20), rgba(255,184,77,0.06));
    box-shadow: 0 0 0 1px rgba(255,184,77,0.32) inset;
  }
  .timing.red {
    background: linear-gradient(135deg, rgba(255,77,109,0.20), rgba(255,77,109,0.06));
    box-shadow: 0 0 0 1px rgba(255,77,109,0.32) inset;
  }
  .timing.gray {
    background: rgba(140,150,170,0.08);
    box-shadow: 0 0 0 1px rgba(140,150,170,0.18) inset;
    opacity: 0.7;
  }
  .timing-icon {
    font-size: 24px;
    line-height: 1;
  }
  .timing-text { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .timing-verdict {
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .timing.green .timing-verdict { color: var(--green); }
  .timing.amber .timing-verdict { color: var(--amber); }
  .timing.red   .timing-verdict { color: var(--red); }
  .timing.gray  .timing-verdict { color: var(--txt-2); }
  .timing-msg {
    font-size: 11px;
    color: var(--txt-1);
    font-weight: 600;
  }
  .timing-sub {
    font-size: 10px;
    color: var(--txt-3);
  }
  .timing-countdown {
    text-align: right;
    display: flex; flex-direction: column; gap: 2px;
    min-width: 70px;
  }
  .timing-countdown-val {
    font-size: 14px;
    font-weight: 700;
    color: var(--txt-1);
  }
  .timing-countdown-lbl {
    font-size: 9px;
    color: var(--txt-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Spot-vs-trigger proximity bar */
  .prox {
    margin-top: 4px;
    height: 6px;
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    position: relative;
    overflow: visible;
  }
  .prox-trigger {
    position: absolute;
    top: -3px; bottom: -3px;
    width: 2px;
    background: var(--aqua);
    box-shadow: 0 0 6px rgba(77,214,255,0.6);
  }
  .prox-stop {
    position: absolute;
    top: 0; bottom: 0;
    background: rgba(255,77,109,0.25);
    border-radius: 3px;
  }
  .prox-tp {
    position: absolute;
    top: 0; bottom: 0;
    background: rgba(20,232,122,0.18);
    border-radius: 3px;
  }
  .prox-spot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px #fff, 0 0 0 2px var(--bg-2);
  }
  .prox-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: var(--txt-3);
    margin-top: 4px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }

  /* Mobile responsive */
  @media (max-width: 600px) {
    .app { padding: 14px 12px 40px; gap: 14px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .ticker { font-size: 24px; }
    .timing-icon { font-size: 20px; }
    .timing-verdict { font-size: 13px; }
    .stats { grid-template-columns: repeat(3, 1fr); }
    .stat { padding: 10px 12px; }
    .stat-val { font-size: 16px; }
    .stat-key { font-size: 9px; }
  }

  .tags {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .tag {
    font-size: 9px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tag.preferred { background: var(--green-soft); color: var(--green); }
  .tag.neutral   { background: var(--aqua-soft); color: var(--aqua); }
  .tag.block     { background: var(--red-soft); color: var(--red); }
  .tag.warn      { background: var(--amber-soft); color: var(--amber); }
  .tag.sector    { background: var(--purple-soft); color: var(--purple); }
  .tag.swing     { background: var(--purple-soft); color: var(--purple); border: 1px solid rgba(180,120,255,0.32); }
  .tag.day       { background: var(--aqua-soft); color: var(--aqua); border: 1px solid rgba(77,214,255,0.32); }
  .tag.scalp     { background: var(--amber-soft); color: var(--amber); border: 1px solid rgba(255,184,77,0.32); }

  /* TAB NAV */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-1);
    border-radius: 12px;
    padding: 4px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.04) inset;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px;
    border-radius: 8px;
    color: var(--txt-2);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    user-select: none;
    transition: background .15s ease, color .15s ease;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tab:hover { background: rgba(255,255,255,0.04); color: var(--txt-1); }
  .tab.active {
    background: linear-gradient(135deg, rgba(77,214,255,0.14), rgba(180,120,255,0.14));
    color: var(--txt-0);
    box-shadow: 0 0 0 1px rgba(77,214,255,0.28) inset;
  }
  .tab.disabled { opacity: 0.35; cursor: not-allowed; }
  .tab .badge {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    font-size: 9px;
    color: var(--txt-2);
  }
  .tab.active .badge { background: rgba(77,214,255,0.2); color: var(--aqua); }

  /* SIM/LIVE toggle */
  .pill-mini.sim {
    cursor: pointer;
    background: rgba(255,184,77,0.12);
    color: var(--amber);
    border: 1px solid rgba(255,184,77,0.32);
  }
  .pill-mini.live-acct {
    cursor: pointer;
    background: rgba(255,77,109,0.12);
    color: var(--red);
    border: 1px solid rgba(255,77,109,0.32);
  }

  /* DETAIL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,9,15,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .overlay.active { display: flex; }
  .detail {
    width: 100%;
    max-width: 720px;
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 16px 48px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.06) inset;
    display: flex; flex-direction: column; gap: 18px;
  }
  .detail-head { display: flex; justify-content: space-between; align-items: flex-start; }
  .detail-close {
    background: rgba(255,255,255,0.06);
    color: var(--txt-1);
    border: none; border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 700;
  }
  .detail-close:hover { background: var(--red-soft); color: var(--red); }
  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background: var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .detail-cell {
    padding: 12px 16px;
    background: linear-gradient(180deg, var(--bg-3), var(--bg-2));
    display: flex; flex-direction: column; gap: 4px;
  }
  .detail-cell .k {
    font-size: 9px; color: var(--txt-3); letter-spacing: 0.14em;
    text-transform: uppercase; font-weight: 700;
  }
  .detail-cell .v { font-size: 16px; color: var(--txt-0); font-weight: 700; }
  .detail-note {
    font-size: 13px;
    color: var(--txt-1);
    line-height: 1.5;
    background: rgba(0,0,0,0.25);
    padding: 14px 18px;
    border-radius: 12px;
  }
  .ticket {
    background: linear-gradient(135deg, rgba(20,232,122,0.16), rgba(77,214,255,0.16));
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: 0 0 0 1px rgba(20,232,122,0.28) inset;
    display: flex; flex-direction: column; gap: 10px;
  }
  .ticket.short {
    background: linear-gradient(135deg, rgba(255,77,109,0.16), rgba(180,120,255,0.16));
    box-shadow: 0 0 0 1px rgba(255,77,109,0.28) inset;
  }
  .ticket-head {
    font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--txt-1);
  }
  .ticket-line { font-size: 16px; font-weight: 700; color: var(--txt-0); }
  .ticket-meta { display: flex; gap: 14px; font-size: 11px; color: var(--txt-2); flex-wrap: wrap; }
  .ticket-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn {
    flex: 1;
    padding: 10px 14px;
    border: none; border-radius: 10px;
    font-family: inherit; font-weight: 700; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer;
  }
  .btn-primary { background: linear-gradient(180deg, #14e87a, #0fb960); color: #07090f; }
  .btn-primary.short { background: linear-gradient(180deg, #ff4d6d, #d12b4d); color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.06); color: var(--txt-1); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--txt-3);
    font-size: 14px;
  }

  .foot {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 4px 0;
    color: var(--txt-3);
    font-size: 10px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-mark">S</div>
      <div>
        <div class="brand-name">STRATUM SCANNER</div>
        <div class="brand-sub" id="scan-date">Loading...</div>
      </div>
    </div>
    <div class="header-right">
      <span class="pill-mini sim" id="account-toggle" onclick="toggleAccount()" title="Click to switch account">SIM</span>
      <span class="pill-mini" id="scan-mode">EOD</span>
      <span class="pill-mini live">LIVE</span>
    </div>
  </div>

  <!-- TAB NAV -->
  <div class="tabs" id="tab-nav"></div>

  <!-- STATS -->
  <div class="stats" id="stats"></div>

  <!-- FILTERS -->
  <div class="filters" id="filters"></div>

  <!-- GRID -->
  <div class="grid" id="grid"><div class="empty">Loading scan...</div></div>

  <!-- FOOT -->
  <div class="foot">
    <span>Stratum Scanner · v1.0</span>
    <span id="meta">--</span>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detail"></div>
</div>

<script>
const EARNINGS_BLOCK = new Set(["AMZN","MSFT","META","GOOGL","GOOG","AAPL","CAT","QCOM"]);
const FOMC_RISK = false; // wire to current date logic

let scan = null;          // WP scan data (SCAN tab)
let movers = null;        // Live movers data (MOVERS tab)
// activeTab: URL ?tab=movers takes precedence > localStorage > default "scan"
let activeTab = (new URLSearchParams(window.location.search).get("tab")) || localStorage.getItem("activeTab") || "scan";
let activeFilter = "all";
let account = localStorage.getItem("account") || "SIM";  // SIM | LIVE

const TABS = [
  { id: "scan",     label: "📊 SCAN",        modeDefault: "SWING" },
  { id: "movers",   label: "⚡ LIVE MOVERS", modeDefault: "DAY" },
  { id: "tomorrow", label: "🌅 TOMORROW",    modeDefault: "SWING", disabled: true, comingSoon: true },
  { id: "options",  label: "💎 OPTIONS",     modeDefault: "DAY",   disabled: true, comingSoon: true },
  { id: "history",  label: "📜 HISTORY",     modeDefault: "—",     disabled: true, comingSoon: true },
  { id: "starred",  label: "⭐ STARRED",     modeDefault: "—",     disabled: true, comingSoon: true },
];

const FILTERS_SCAN = [
  { id: "all",     label: "All",            test: c => true },
  { id: "top",     label: "Top 5",          test: (c, i) => i < 5 },
  { id: "call",    label: "Calls",          test: c => c.direction === "CALL" },
  { id: "put",     label: "Puts",           test: c => c.direction === "PUT" },
  { id: "clear",   label: "Earnings clear", test: c => !EARNINGS_BLOCK.has(c.ticker) },
  { id: "high",    label: "Score 10+",      test: c => (c.score || 0) >= 10 },
  { id: "preferred", label: "Preferred sector", test: c => c.sectorTier === "preferred" },
];

const FILTERS_MOVERS = [
  { id: "all",     label: "All",            test: c => true },
  { id: "top",     label: "Top 10",         test: (c, i) => i < 10 },
  { id: "up",      label: "Up movers",      test: c => c.pctChange > 0 },
  { id: "down",    label: "Down movers",    test: c => c.pctChange < 0 },
  { id: "vol",     label: "High volume",    test: c => (c.volRatio || 0) >= 1.5 },
  { id: "big",     label: "Big move 3%+",   test: c => Math.abs(c.pctChange || 0) >= 3 },
];

// Variable filter list driven by tab
let FILTERS = FILTERS_SCAN;

function fmtPct(v) {
  if (v == null) return "-";
  const sign = v >= 0 ? "+" : "";
  return sign + v.toFixed(2) + "%";
}
function fmtNum(v, dec=2) {
  if (v == null) return "-";
  return v.toFixed(dec);
}
function scoreClass(s) {
  if (s >= 10) return "high";
  if (s >= 7)  return "mid";
  return "low";
}

// =============================================================================
// ENTRY TIMING ENGINE
// Computes, per candidate: trigger / stop / TP / where spot is in the move.
// Returns a verdict that drives the card's prominent timing badge.
// =============================================================================
function getEntryTiming(c) {
  const isCall = c.direction === "CALL";
  const trigger = isCall ? c.priorHigh : c.priorLow;
  const stop    = isCall ? c.todayLow  : c.todayHigh;
  const r       = Math.abs(trigger - stop);
  const tp1     = isCall ? trigger + r   : trigger - r;
  const spot    = c.spot;

  // How far past trigger? in R units (1R = trigger->stop distance)
  // Positive = in the direction of the trade (good)
  // Negative = below trigger for CALL, above for PUT (still waiting)
  const directional = isCall ? (spot - trigger) : (trigger - spot);
  const rMultiple = r > 0 ? directional / r : 0;

  // Distance to trigger as % of spot
  const distPct = spot > 0 ? Math.abs(spot - trigger) / spot * 100 : 0;

  // Stopped out?  (spot past stop in wrong direction)
  const stoppedOut = isCall ? (spot < stop) : (spot > stop);

  let verdict, color, msg, sub;
  if (stoppedOut) {
    verdict = "INVALID"; color = "gray";
    msg = "Setup invalidated"; sub = `Past ${isCall ? "stop low" : "stop high"} ${fmtNum(stop)}`;
  } else if (rMultiple < -0.15) {
    // More than 15% of R below trigger -> still waiting for break
    verdict = "WAIT"; color = "amber";
    msg = "Wait for trigger"; sub = `${fmtPct(distPct)} below ${fmtNum(trigger)}`;
  } else if (rMultiple < 0.15) {
    // Within ±15% of R from trigger -> sweet spot, fire now
    verdict = "ENTER NOW"; color = "green";
    msg = "Trigger zone live"; sub = `Spot ${fmtNum(spot)} vs trigger ${fmtNum(trigger)}`;
  } else if (rMultiple < 0.5) {
    // 15-50% into the move -> still good RR
    verdict = "STILL GOOD"; color = "green";
    msg = `${rMultiple.toFixed(2)}R into move`; sub = `Entry OK, RR ${(2 - rMultiple).toFixed(1)} to TP2`;
  } else if (rMultiple < 1.0) {
    // 50%-100% into the move -> chase risk
    verdict = "CHASE RISK"; color = "amber";
    msg = `${rMultiple.toFixed(2)}R extended`; sub = `RR shrunk - tight stop required`;
  } else {
    // Past TP1 -> missed
    verdict = "MISSED"; color = "red";
    msg = "Past TP1"; sub = `${rMultiple.toFixed(2)}R extended - chase = bad RR`;
  }

  return { verdict, color, msg, sub, trigger, stop, tp1, rMultiple, distPct, isCall };
}

// =============================================================================
// CANDLE COUNTDOWN
// Time remaining in current candle. Defaults to Daily (4 PM ET close on RTH).
// =============================================================================
function getCandleCountdown(tf) {
  // Get current time in ET
  const now = new Date();
  const etStr = now.toLocaleString("en-US", { timeZone: "America/New_York" });
  const et = new Date(etStr);
  const dow = et.getDay(); // Sun=0
  const h = et.getHours();
  const m = et.getMinutes();
  const s = et.getSeconds();

  // Weekend? Next candle is Monday 9:30 AM
  if (dow === 0 || dow === 6) {
    return { label: "Weekend", remaining: "—" };
  }

  // For Daily: close at 4:00 PM ET
  // For 4HR (RTH): closes at 1:30 PM and 4:00 PM
  if (tf === "4HR" || tf === "4H") {
    let target;
    if (h < 13 || (h === 13 && m < 30)) {
      target = new Date(et); target.setHours(13, 30, 0, 0);
    } else if (h < 16) {
      target = new Date(et); target.setHours(16, 0, 0, 0);
    } else {
      // After hours -> next day 1:30 PM
      target = new Date(et); target.setDate(target.getDate() + (dow === 5 ? 3 : 1));
      target.setHours(13, 30, 0, 0);
    }
    return formatCountdown(target - et);
  }

  // Default Daily: 4:00 PM ET close
  let target = new Date(et);
  if (h >= 16) {
    // After close -> tomorrow 4 PM (Friday -> Monday)
    target.setDate(target.getDate() + (dow === 5 ? 3 : 1));
  }
  target.setHours(16, 0, 0, 0);
  const ms = target - et;
  return formatCountdown(ms);
}

function formatCountdown(ms) {
  if (ms <= 0) return { label: "—", remaining: "—" };
  const totalMin = Math.floor(ms / 60000);
  const hours = Math.floor(totalMin / 60);
  const mins  = totalMin % 60;
  const secs  = Math.floor((ms % 60000) / 1000);
  let remaining;
  if (hours > 0) remaining = `${hours}h ${String(mins).padStart(2,"0")}m`;
  else if (mins >= 10) remaining = `${mins}m ${String(secs).padStart(2,"0")}s`;
  else remaining = `${mins}:${String(secs).padStart(2,"0")}`;
  // Label shows "next close in"
  return { label: "Daily close", remaining };
}

function renderStats() {
  const cands = scan.candidates || [];
  const longs  = cands.filter(c => c.direction === "CALL").length;
  const shorts = cands.filter(c => c.direction === "PUT").length;
  const cleared = cands.filter(c => !EARNINGS_BLOCK.has(c.ticker)).length;
  const topScore = cands.reduce((m, c) => Math.max(m, c.score || 0), 0);
  const stats = [
    { k: "Candidates", v: cands.length, cls: "" },
    { k: "Calls", v: longs, cls: "green" },
    { k: "Puts", v: shorts, cls: "red" },
    { k: "Earnings clear", v: cleared, cls: "aqua" },
    { k: "Top score", v: topScore, cls: "" },
    { k: "Universe", v: scan.universeSize || "-", cls: "" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

function renderFilters() {
  const cands = scan.candidates || [];
  document.getElementById("filters").innerHTML = FILTERS.map(f => {
    const count = cands.filter((c, i) => f.test(c, i)).length;
    return `<div class="filter ${f.id === activeFilter ? "active" : ""}" data-id="${f.id}">${f.label}<span class="count">${count}</span></div>`;
  }).join("");
  document.querySelectorAll(".filter").forEach(el => {
    el.addEventListener("click", () => {
      activeFilter = el.dataset.id;
      renderFilters();
      renderGrid();
    });
  });
}

function renderGrid() {
  const cands = scan.candidates || [];
  const filter = FILTERS.find(f => f.id === activeFilter) || FILTERS[0];
  const filtered = cands.filter((c, i) => filter.test(c, i));
  if (!filtered.length) {
    document.getElementById("grid").innerHTML = `<div class="empty">No candidates match this filter.</div>`;
    return;
  }
  document.getElementById("grid").innerHTML = filtered.map((c, i) => {
    const isCall = c.direction === "CALL";
    const isEarnings = EARNINGS_BLOCK.has(c.ticker);
    const sectorTier = c.sectorTier || "neutral";
    const sectorMomDisplay = c.sectorMom != null ? fmtPct(c.sectorMom) : "";
    const t = getEntryTiming(c);
    const cd = getCandleCountdown("Daily");
    const icon = t.color === "green" ? "🟢" : t.color === "amber" ? "🟡" : t.color === "red" ? "🔴" : "⚪";

    // Proximity bar layout: map stop -> trigger -> tp1 to a 0-100% scale
    // stop at left, trigger in middle (50%), tp1 at right (100%)
    // spot position: clamp into 0-100%
    const lo = Math.min(t.stop, t.tp1, t.trigger, c.spot);
    const hi = Math.max(t.stop, t.tp1, t.trigger, c.spot);
    const span = Math.max(0.01, hi - lo);
    const pct = (val) => Math.max(0, Math.min(100, ((val - lo) / span) * 100));
    const triggerPct = pct(t.trigger);
    const stopPct = pct(t.stop);
    const tp1Pct = pct(t.tp1);
    const spotPct = pct(c.spot);
    const stopBar = isCall
      ? `left:${pct(t.stop)}%; right:${100 - triggerPct}%`
      : `left:${triggerPct}%; right:${100 - pct(t.stop)}%`;
    const tpBar = isCall
      ? `left:${triggerPct}%; right:${100 - tp1Pct}%`
      : `left:${tp1Pct}%; right:${100 - triggerPct}%`;

    return `
      <div class="card ${isCall ? "long" : "short"} ${isEarnings ? "earnings-block" : ""}" data-idx="${cands.indexOf(c)}">
        <div class="card-head">
          <div>
            <div class="ticker mono">${c.ticker}</div>
            <div style="font-size:11px; color: var(--txt-3); margin-top:4px;">$${fmtNum(c.spot)} <span style="color: ${c.momentum5d >= 0 ? "var(--green)" : "var(--red)"}; margin-left:4px;">${fmtPct(c.momentum5d)} 5d</span></div>
          </div>
          <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end;">
            <span class="dir-pill ${isCall ? "call" : "put"}">${c.direction}</span>
            <div class="score-badge"><span class="score-num ${scoreClass(c.score)} mono">${c.score}</span><span class="score-lbl">Score</span></div>
          </div>
        </div>

        <div class="timing ${t.color}">
          <span class="timing-icon">${icon}</span>
          <div class="timing-text">
            <span class="timing-verdict">${t.verdict}</span>
            <span class="timing-msg">${t.msg}</span>
            <span class="timing-sub">${t.sub}</span>
          </div>
          <div class="timing-countdown">
            <span class="timing-countdown-val mono" data-countdown="Daily">${cd.remaining}</span>
            <span class="timing-countdown-lbl">${cd.label}</span>
          </div>
        </div>

        <div>
          <div class="prox">
            <div class="prox-stop"  style="${stopBar}"></div>
            <div class="prox-tp"    style="${tpBar}"></div>
            <div class="prox-trigger" style="left:${triggerPct}%"></div>
            <div class="prox-spot" style="left:${spotPct}%"></div>
          </div>
          <div class="prox-labels">
            <span>${isCall ? "Stop " + fmtNum(t.stop) : "Stop " + fmtNum(t.stop)}</span>
            <span style="color: var(--aqua);">Trig ${fmtNum(t.trigger)}</span>
            <span>TP1 ${fmtNum(t.tp1)}</span>
          </div>
        </div>

        <div>
          <span class="pattern">${c.pattern}</span>
        </div>
        <div class="metrics">
          <div class="metric"><span class="metric-key">Prior Hi</span><span class="metric-val mono">${fmtNum(c.priorHigh)}</span></div>
          <div class="metric"><span class="metric-key">Prior Lo</span><span class="metric-val mono">${fmtNum(c.priorLow)}</span></div>
          <div class="metric"><span class="metric-key">Today Hi</span><span class="metric-val mono">${fmtNum(c.todayHigh)}</span></div>
          <div class="metric"><span class="metric-key">Today Lo</span><span class="metric-val mono">${fmtNum(c.todayLow)}</span></div>
        </div>
        <div class="tags">
          <span class="tag swing">SWING</span>
          <span class="tag sector">${c.sector || "-"} ${sectorMomDisplay}</span>
          <span class="tag ${sectorTier}">${sectorTier}</span>
          ${isEarnings ? '<span class="tag block">⚠ Earnings</span>' : ""}
          ${c.emaStackBull ? '<span class="tag preferred">EMA Bull</span>' : ""}
        </div>
        ${c.note ? `<div class="note">${c.note}</div>` : ""}
      </div>
    `;
  }).join("");
  document.querySelectorAll(".card").forEach(el => {
    el.addEventListener("click", () => openDetail(parseInt(el.dataset.idx)));
  });
}

function openDetail(idx) {

  const trigger = isCall ? c.priorHigh : c.priorLow;
  const stop    = isCall ? c.todayLow  : c.todayHigh;
  const r       = Math.abs(trigger - stop);
  const tp1     = isCall ? trigger + r : trigger - r;
  const tp2     = isCall ? trigger + 2*r : trigger - 2*r;
  const isEarnings = EARNINGS_BLOCK.has(c.ticker);

  document.getElementById("detail").innerHTML = `
    <div class="detail-head">
      <div>
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
          <span class="ticker mono">${c.ticker}</span>

        </div>
        <div style="font-size: 13px; color: var(--txt-2);">${c.pattern} · Score <span class="${scoreClass(c.score)}" style="font-weight:700;">${c.score}</span> · ${c.sector || ""}</div>
      </div>

    <div class="detail-grid">
      <div class="detail-cell"><span class="k">Spot</span><span class="v mono">$${fmtNum(c.spot)}</span></div>
      <div class="detail-cell"><span class="k">5-Day Mom</span><span class="v mono ${c.momentum5d>=0?"":""}">${fmtPct(c.momentum5d)}</span></div>
      <div class="detail-cell"><span class="k">EMA 9 / 21</span><span class="v mono">${fmtNum(c.ema9)} / ${fmtNum(c.ema21)}</span></div>
      <div class="detail-cell"><span class="k">EMA Stack</span><span class="v">${c.emaStackBull ? "BULL ✓" : "—"}</span></div>
      <div class="detail-cell"><span class="k">Sector Mom</span><span class="v mono">${fmtPct(c.sectorMom)}</span></div>

    <div class="detail-grid">

      <div class="detail-cell"><span class="k">Stop</span><span class="v mono" style="color: var(--red);">${fmtNum(stop)}</span></div>
      <div class="detail-cell"><span class="k">Risk (R)</span><span class="v mono">${fmtNum(r)}</span></div>
      <div class="detail-cell"><span class="k">TP1 (1R)</span><span class="v mono" style="color: var(--green);">${fmtNum(tp1)}</span></div>
      <div class="detail-cell"><span class="k">TP2 (2R)</span><span class="v mono" style="color: var(--green);">${fmtNum(tp2)}</span></div>
      <div class="detail-cell"><span class="k">Direction</span><span class="v">${isCall ? "LONG" : "SHORT"}</span></div>
    </div>

    ${c.note ? `<div class="detail-note">${c.note}</div>` : ""}

    <div class="ticket ${isCall ? "" : "short"}">
      <div class="ticket-head">🎟️ Trade Plan (Stock Reference)</div>
      <div class="ticket-line mono">${isCall ? "BUY" : "SHORT"} ${c.ticker} @ ${fmtNum(trigger)} · stop ${fmtNum(stop)} · tp ${fmtNum(tp1)}</div>
      <div class="ticket-meta">
        <span><b>R:</b> $${fmtNum(r)}</span>
        <span><b>RR 1R:</b> 1.0</span>
        <span><b>RR 2R:</b> 2.0</span>
        ${isEarnings ? "<span style='color: var(--amber);'><b>⚠</b> Earnings AH</span>" : ""}
      </div>
      <div class="ticket-actions">
        <button class="btn btn-secondary" onclick="copyDetailTicket(${idx})">Copy</button>
        <button class="btn btn-secondary" onclick="window.open('https://www.tradingview.com/chart/?symbol=' + '${c.ticker}', '_blank')">Open Chart</button>
        <button class="btn btn-primary ${isCall ? "" : "short"}" onclick="dispatchToTitan(${idx}, this)">🎟️ Send to Titan</button>
      </div>
    </div>
  `;
  document.getElementById("overlay").classList.add("active");
}

async function dispatchToTitan(idx, btn) {
  const c = scan.candidates[idx];
  const isCall = c.direction === "CALL";
  const trigger = isCall ? c.priorHigh : c.priorLow;
  const stop    = isCall ? c.todayLow  : c.todayHigh;
  const r       = Math.abs(trigger - stop);
  const tp1     = isCall ? trigger + r : trigger - r;
  const conviction = c.score >= 12 ? "high" : c.score >= 9 ? "medium" : "low";
  const titanCard = `${isCall ? "BUY" : "SHORT"} ${c.ticker} @ ${trigger.toFixed(2)} | stop ${stop.toFixed(2)} | tp ${tp1.toFixed(2)} | ${c.pattern} | conv:${conviction} | acct:${account}`;

  if (!confirm(`Dispatch to Titan queue?\n\nAccount: ${account}\n${titanCard}\n\nMode: REVIEW (manual approval at Titan)\nConviction: ${conviction.toUpperCase()}`)) return;

  const orig = btn.textContent;
  btn.textContent = "Dispatching...";
  btn.disabled = true;

  try {
    const resp = await fetch('/api/card-dispatch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ticker: c.ticker,
        mode: 'review',
        conviction: conviction,
        card: c,
        titanCard: titanCard,
        source: 'scanner-v2',
        account: account
      })
    });
    const data = await resp.json();
    if (data.ok) {
      btn.textContent = data.deduped ? "Already queued ✓" : "Sent to Titan ✓";
      btn.style.background = "linear-gradient(180deg, #14e87a, #0fb960)";
      btn.style.color = "#07090f";
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ""; btn.style.color = ""; }, 2000);
    } else {
      btn.textContent = "❌ " + (data.reason || "failed");
      btn.style.background = "var(--red-soft)";
      btn.style.color = "var(--red)";
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ""; btn.style.color = ""; }, 3000);
    }
  } catch (e) {
    btn.textContent = "❌ " + e.message;
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 3000);
  }
}

function closeDetail() {
  document.getElementById("overlay").classList.remove("active");
}

function copyDetailTicket(idx) {
  const c = scan.candidates[idx];
  const isCall = c.direction === "CALL";
  const trigger = isCall ? c.priorHigh : c.priorLow;
  const stop    = isCall ? c.todayLow  : c.todayHigh;
  const tp1     = isCall ? trigger + Math.abs(trigger - stop) : trigger - Math.abs(trigger - stop);
  const txt = `${isCall ? "BUY" : "SHORT"} ${c.ticker} @ ${trigger.toFixed(2)} | stop ${stop.toFixed(2)} | tp ${tp1.toFixed(2)} | ${c.pattern}`;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = event.target;
    const old = btn.textContent;
    btn.textContent = "Copied ✓";
    setTimeout(() => btn.textContent = old, 1200);
  });
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeDetail();
});

function renderTabs() {
  const counts = {
    scan: scan?.candidates?.length ?? "—",
    movers: movers?.movers?.length ?? "—",
  };
  document.getElementById("tab-nav").innerHTML = TABS.map(t => {
    const isActive = t.id === activeTab;
    const cls = ["tab"];
    if (isActive) cls.push("active");
    if (t.disabled) cls.push("disabled");
    const count = counts[t.id];
    return `<div class="${cls.join(" ")}" data-tab="${t.id}">${t.label}${count !== undefined ? `<span class="badge">${count}</span>` : ""}${t.comingSoon ? `<span class="badge">soon</span>` : ""}</div>`;
  }).join("");
  document.querySelectorAll(".tab").forEach(el => {
    el.addEventListener("click", () => {

      renderTabs();
      loadActiveTab();
    });
  });
}

async function loadActiveTab() {
  if (activeTab === "scan")    return loadScanData();
  if (activeTab === "movers")  return loadMoversData();
  document.getElementById("grid").innerHTML = `<div class="empty">Tab "${activeTab}" coming soon.</div>`;
  document.getElementById("stats").innerHTML = "";
  document.getElementById("filters").innerHTML = "";
}

async function loadScanData() {
  FILTERS = FILTERS_SCAN;
  const params = new URLSearchParams(window.location.search);
  const direction = params.get("direction") || "both";
  const force = params.get("force") === "1" ? "&force=1" : "";
  const src = `/api/wealthprince-scan?direction=${direction}${force}`;
  try {
    if (!scan) document.getElementById("grid").innerHTML = `<div class="empty">Loading WP scan...</div>`;
    const r = await fetch(src, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    scan = data;
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">
      Could not load WP scan: <code>${e.message}</code><br><br>
      <span style="font-size:11px;">Try <a style="color: var(--aqua); text-decoration:none;" href="?force=1">force refresh</a>.</span>
    </div>`;
    return;
  }
  document.getElementById("scan-date").textContent =
    "WP Scan · " + (scan.timestamp ? new Date(scan.timestamp).toLocaleString("en-US", {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"}) : "—");
  document.getElementById("meta").textContent =
    `${scan.scanned || "?"} scanned · ${scan.candidatesFound || scan.candidates?.length || 0} candidates`;
  renderStatsScan();
  renderFilters();
  renderTabs();
  renderGrid();
}

async function loadMoversData() {
  FILTERS = FILTERS_MOVERS;
  try {
    if (!movers) document.getElementById("grid").innerHTML = `<div class="empty">Loading Live Movers...</div>`;
    const r = await fetch("/api/live-movers", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    movers = data;
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">
      Could not load Live Movers: <code>${e.message}</code>
    </div>`;
    return;
  }
  document.getElementById("scan-date").textContent =
    "Live Movers · " + (movers.timestamp ? new Date(movers.timestamp).toLocaleString("en-US", {hour:"2-digit", minute:"2-digit", second:"2-digit"}) : "live");
  document.getElementById("meta").textContent =
    `${movers.universeSize || 60} scanned · ${(movers.movers || []).length} movers`;
  renderStatsMovers();
  renderFilters();
  renderTabs();
  renderGridMovers();
}

function renderStatsScan() {
  const cands = scan.candidates || [];
  const longs  = cands.filter(c => c.direction === "CALL").length;
  const shorts = cands.filter(c => c.direction === "PUT").length;
  const cleared = cands.filter(c => !EARNINGS_BLOCK.has(c.ticker)).length;
  const topScore = cands.reduce((m, c) => Math.max(m, c.score || 0), 0);
  const stats = [
    { k: "Candidates", v: cands.length, cls: "" },
    { k: "Calls", v: longs, cls: "green" },
    { k: "Puts", v: shorts, cls: "red" },
    { k: "Earnings clear", v: cleared, cls: "aqua" },
    { k: "Top score", v: topScore, cls: "" },
    { k: "Universe", v: scan.universeSize || "—", cls: "" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

function renderStatsMovers() {
  const ms = movers.movers || [];
  const ups = ms.filter(m => m.pctChange > 0).length;
  const downs = ms.filter(m => m.pctChange < 0).length;
  const big = ms.filter(m => Math.abs(m.pctChange) >= 3).length;
  const highVol = ms.filter(m => (m.volRatio || 0) >= 1.5).length;
  const top = ms[0];
  const stats = [
    { k: "Movers", v: ms.length, cls: "" },
    { k: "Up", v: ups, cls: "green" },
    { k: "Down", v: downs, cls: "red" },
    { k: "3%+", v: big, cls: "aqua" },
    { k: "1.5x Vol", v: highVol, cls: "" },
    { k: "Top", v: top ? top.ticker : "—", cls: "" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

// Backwards-compat alias: old renderStats() now dispatches by tab
function renderStats() {
  return activeTab === "movers" ? renderStatsMovers() : renderStatsScan();
}

// =============================================================================
// LIVE MOVERS GRID
// =============================================================================
function renderGridMovers() {
  const ms = movers.movers || [];
  const filter = FILTERS.find(f => f.id === activeFilter) || FILTERS[0];
  const filtered = ms.filter((c, i) => filter.test(c, i));
  if (!filtered.length) {
    document.getElementById("grid").innerHTML = `<div class="empty">No movers match this filter.</div>`;
    return;
  }
  document.getElementById("grid").innerHTML = filtered.map((m, i) => {
    const isUp = m.pctChange > 0;
    const isCall = isUp;
    const isEarnings = EARNINGS_BLOCK.has(m.ticker);
    const cd = getCandleCountdown("Daily");
    // For movers: use intraday H/L as the trigger zone
    const trigger = isCall ? m.high : m.low;
    const stop    = isCall ? m.low  : m.high;
    const r       = Math.abs(trigger - stop);
    const tp1     = isCall ? trigger + r : trigger - r;
    const spot    = m.last;
    // Verdict logic similar to scan timing but adapted for intraday momentum
    const directional = isCall ? (spot - trigger) : (trigger - spot);
    const rMultiple = r > 0 ? directional / r : 0;
    let verdict, color, msg, sub, icon;
    if (rMultiple < -0.05 && Math.abs(spot - trigger) / spot * 100 < 0.5) {
      verdict = "ENTER NOW"; color = "green"; icon = "🟢";
      msg = "At intraday extreme"; sub = `Spot ${fmtNum(spot)} testing ${fmtNum(trigger)}`;
    } else if (rMultiple < -0.15) {
      verdict = "WAIT"; color = "amber"; icon = "🟡";
      msg = `Pulled back from ${isCall ? "high" : "low"}`; sub = `${fmtNum(Math.abs(trigger - spot))} away from breakout`;
    } else if (rMultiple < 0.5) {
      verdict = "STILL GOOD"; color = "green"; icon = "🟢";
      msg = `Breaking ${isCall ? "high" : "low"}`; sub = `${rMultiple.toFixed(2)}R extended`;
    } else {
      verdict = "CHASE RISK"; color = "amber"; icon = "🟡";
      msg = "Move extended"; sub = `${rMultiple.toFixed(2)}R - tight stop required`;
    }
    const lo = Math.min(stop, tp1, trigger, spot);
    const hi = Math.max(stop, tp1, trigger, spot);
    const span = Math.max(0.01, hi - lo);
    const pct = (val) => Math.max(0, Math.min(100, ((val - lo) / span) * 100));
    const triggerPct = pct(trigger), stopPct = pct(stop), tp1Pct = pct(tp1), spotPct = pct(spot);
    const stopBar = isCall ? `left:${stopPct}%; right:${100 - triggerPct}%` : `left:${triggerPct}%; right:${100 - stopPct}%`;
    const tpBar   = isCall ? `left:${triggerPct}%; right:${100 - tp1Pct}%` : `left:${tp1Pct}%; right:${100 - triggerPct}%`;
    return `
      <div class="card ${isUp ? "long" : "short"} ${isEarnings ? "earnings-block" : ""}" data-mover-idx="${ms.indexOf(m)}">
        <div class="card-head">
          <div>
            <div class="ticker mono">${m.ticker}</div>
            <div style="font-size:11px; color: var(--txt-3); margin-top:4px;">$${fmtNum(m.last)} <span style="color: ${isUp ? "var(--green)" : "var(--red)"}; margin-left:4px;">${fmtPct(m.pctChange)}</span></div>
          </div>
          <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end;">
            <span class="dir-pill ${isUp ? "call" : "put"}">${isUp ? "CALL" : "PUT"}</span>
            <div class="score-badge"><span class="score-num ${scoreClass((m.score||0))} mono">${fmtNum(m.score, 1)}</span><span class="score-lbl">Score</span></div>
          </div>
        </div>
        <div class="timing ${color}">
          <span class="timing-icon">${icon}</span>
          <div class="timing-text">
            <span class="timing-verdict">${verdict}</span>
            <span class="timing-msg">${msg}</span>
            <span class="timing-sub">${sub}</span>
          </div>
          <div class="timing-countdown">
            <span class="timing-countdown-val mono" data-countdown="Daily">${cd.remaining}</span>
            <span class="timing-countdown-lbl">${cd.label}</span>
          </div>
        </div>
        <div>
          <div class="prox">
            <div class="prox-stop"  style="${stopBar}"></div>
            <div class="prox-tp"    style="${tpBar}"></div>
            <div class="prox-trigger" style="left:${triggerPct}%"></div>
            <div class="prox-spot" style="left:${spotPct}%"></div>
          </div>
          <div class="prox-labels">
            <span>Stop ${fmtNum(stop)}</span>
            <span style="color: var(--aqua);">Trig ${fmtNum(trigger)}</span>
            <span>TP1 ${fmtNum(tp1)}</span>
          </div>
        </div>
        <div class="metrics">
          <div class="metric"><span class="metric-key">Open</span><span class="metric-val mono">${fmtNum(m.open)}</span></div>
          <div class="metric"><span class="metric-key">Prev Close</span><span class="metric-val mono">${fmtNum(m.prevClose)}</span></div>
          <div class="metric"><span class="metric-key">Range %</span><span class="metric-val mono">${fmtNum(m.rangePct, 2)}%</span></div>
          <div class="metric"><span class="metric-key">Vol Ratio</span><span class="metric-val mono">${m.volRatio ? m.volRatio.toFixed(2) + "x" : "—"}</span></div>
        </div>
        <div class="tags">
          <span class="tag day">DAY</span>
          ${isEarnings ? '<span class="tag block">⚠ Earnings</span>' : ""}
          ${m.volRatio >= 2 ? '<span class="tag preferred">High Vol</span>' : ""}
          ${Math.abs(m.pctChange) >= 5 ? '<span class="tag warn">Big Mover</span>' : ""}
        </div>
      </div>
    `;
  }).join("");
}

// =============================================================================
// INIT
// =============================================================================
applyAccount();
renderTabs();
loadActiveTab();
// Re-poll active tab every 30s
setInterval(() => loadActiveTab(), 30000);
// Live-tick the countdown labels so "5h 23m → 5h 22m" updates without a full re-render
setInterval(() => {
  document.querySelectorAll("[data-countdown]").forEach(el => {
    const cd = getCandleCountdown(el.dataset.countdown || "Daily");
    el.textContent = cd.remaining;
  });
}, 1000);
</script>
</body>
