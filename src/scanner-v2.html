      const liveSpot = (window._radarSpots && window._radarSpots[r.ticker] && window._radarSpots[r.ticker].last) || r.spot;
      const proximityHtml = buildProximityHtml(liveSpot, r.trigger, dirText);
      // Phase 4.29 — FIRE GRADE pill + checklist + strategy tag

            <div>

              <div style="font-size:11px; color: var(--txt-3); margin-top:4px;">${liveSpot ? '$' + fmtNum(liveSpot) : '$—'}${r.type ? ` · Type ${r.type}` : ''}</div>
            </div>

// May 6 — TradeStation fire dispatcher for Tomorrow tab radar entries.
// Mirrors dispatchRadarToPublic but routes to /api/take-trade (the same
// endpoint scanner.html uses for TS fires). useTrigger=true queues a
// conditional bracket; false fires immediately.
async function dispatchRadarToTS(ticker, useTrigger, btn) {
  if (!radarData || !radarData._flat) return alert('Radar data not loaded');
  const r = radarData._flat.find(x => x.ticker === ticker);
  if (!r) return alert('Setup not found in radar for ' + ticker);

  const isLong = (r.target || 0) >= (r.spot || 0);
  const dirText = (r.direction || (isLong ? 'LONG' : 'SHORT')).toUpperCase();
  const isCall = dirText === 'LONG' || dirText === 'CALL';
  const direction = isCall ? 'BULLISH' : 'BEARISH';

  // Phase 4.16 — TA gate
  const taOk = await taGateOrAbort(ticker, isCall ? 'long' : 'short');
  if (!taOk) return;
  // Phase 4.21 — MANDATORY chart-vision gate (radar swings → SWING TF map)
  const visionOk = await chartVisionGateOrAbort(ticker, isCall ? 'long' : 'short', 'SWING');
  if (!visionOk) return;

  // Build OPRA contract symbol from preferredContractSymbol (already in OPRA
  // format like NTAP260515C00115000) or fall back to constructing from r.contract
  let contractSym = r.preferredContractSymbol || r.contract;
  if (!contractSym) return alert('No contract symbol for ' + ticker + ' — cannot fire');
  // Convert NTAP260515C00115000 to TS-style "NTAP 260515C00115000" (with space)
  const opraMatch = contractSym.replace(/^O:/, '').match(/^([A-Z]+)(\d{6}[CP]\d+)$/);
  const tsSymbol = opraMatch ? opraMatch[1] + ' ' + opraMatch[2] : contractSym;

  // Premium math from setup. Default to 25%/50% TPs if no optionEntry.
  const optEntry = r.optionEntry || 0;
  const optStop  = r.optionStop || (optEntry * 0.75);
  const optTp1   = r.optionTp1 || r.optTp1 || (optEntry * 1.25);
  const optTp2   = r.optionTp2 || (optEntry * 1.50);

  if (!optEntry) return alert('No option entry price for ' + ticker + ' — refresh radar mids');

  const sec = localStorage.getItem('stratum_secret');
  if (!sec) return alert('STRATUM_SECRET missing in localStorage. ARM to set it.');

  const verb = useTrigger ? 'QUEUE w/ TRIGGER' : 'FIRE NOW';
  if (!confirm(`⚡ TS ${verb} — ${ticker} ${dirText}?\n\nContract: ${tsSymbol}\nEntry: $${optEntry.toFixed(2)}  Stop: $${optStop.toFixed(2)}  TP1: $${optTp1.toFixed(2)}\n${useTrigger ? 'Trigger: ' + ticker + ' above $' + r.trigger : 'Immediate market entry'}\n\nAccount: 11975462 LIVE`)) return;

  const body = {
    ticker: ticker,
    symbol: tsSymbol,
    direction: direction,
    qty: 1,
    entry: optEntry,
    stop: optStop,
    tp1: optTp1,
    tp2: optTp2,
    structuralStop: r.stop ? { symbol: ticker, predicate: 'below', price: r.stop } : null,
    live: true,
    source: 'tomorrow-radar-' + ticker + (useTrigger ? '-queued' : '-firenow'),
  };
  if (useTrigger && r.trigger) {
    body.trigger = { symbol: ticker, predicate: 'above', price: r.trigger };
  }

  if (btn) { btn.disabled = true; btn.textContent = '⏳ submitting…'; }
  try {
    const resp = await fetch('/api/take-trade', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Stratum-Secret': sec },
      body: JSON.stringify(body),
    });
    const j = await resp.json();
    if (resp.status === 200) {
      const ok = (j.brackets || []).filter(x => x.ok).length;
      alert(`✅ ${ok}/${(j.brackets||[]).length} bracket(s) ${useTrigger ? 'QUEUED' : 'FIRED'} at TS LIVE\nDollar risk: $${j.dollarRisk}`);
    } else {
      alert(`❌ TS fire failed: ${j.error || 'HTTP ' + resp.status}`);
    }
  } catch (e) {
    alert(`❌ TS fire network error: ${e.message}`);
  }
  if (btn) { btn.disabled = false; btn.textContent = useTrigger ? '🎯 TS QUEUE' : '⚡ TS FIRE'; }
}
window.dispatchRadarToTS = dispatchRadarToTS;

async function loadActionData() {

    const r = await fetch(`/api/action-radar?maxBudget=${budget}&minScore=10`, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    actionData = await r.json();
    // Phase 4.15 — bulk TA verify for ACTIONABLE rows so card shows alignment badge
    const actionable = (actionData.rows || []).filter(r => r.status === 'ACTIONABLE');
    await Promise.all(actionable.map(async r => {
      try {
        const tr = await fetch(`/api/ta-verify?ticker=${encodeURIComponent(r.ticker)}&direction=${encodeURIComponent(r.direction)}`, { cache: 'no-store' });
        if (tr.ok) r.ta = await tr.json();
      } catch (e) {}
    }));
    // Phase 4.22 — multi-test breakout flag (long-only)
    try { await buildMultiTestBreakoutForRows(actionable, r => r.ticker, r => r.direction, '60m'); } catch (e) {}
    // Phase 4.29 — FIRE GRADE composite (replaces broken conviction score)
    try { await buildFireGradeForRows(actionable, r => r.ticker, r => r.direction, 'SWING'); } catch (e) {}
    // Phase 4.23 — bulk VPOC fetch for ACTIONABLE + WATCH (high-conviction).
    // Non-blocking: render once now, then re-render with VPOC pills when data lands.
    try {
      const vpRows = (actionData.rows || []).filter(r => r.status === 'ACTIONABLE' || r.status === 'WATCH');
      fetchVpForRows(vpRows, r => r.ticker, { tf: 'Daily', lookback: 20 }).then(() => {
        try { if (activeTab === 'action') renderGridAction(); } catch (e) {}
      });
    } catch (e) {}
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">Action radar error: <code style="color:var(--red)">${e.message}</code></div>`;
    return;
  }
  document.getElementById("scan-date").textContent = "Action Radar · " + new Date(actionData.timestamp).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  document.getElementById("meta").textContent = `${actionData.actionableCount} ACTIONABLE · ${actionData.tickerCount - actionData.actionableCount} watch/filtered · budget $${actionData.maxBudget}/ct`;
  renderStatsAction();
  renderTabs();
  document.getElementById("filters").innerHTML = '';
  renderGridAction();
  startActionPoll();
}

  const trigStr = useTrigger && sug.stockTrigger
    ? `Trigger: ${row.ticker} above $${Number(sug.stockTrigger).toFixed(2)}`
    : 'Immediate market entry';
  const stopStr = stop.symbol
    ? `Structural stop: ${stop.symbol} ${stop.predicate || 'below'} $${Number(stop.price).toFixed(2)}`
    : `Stop: option < $${optStop} (-50% tail-risk only)`;

  if (!confirm(`⚡ ${verb} — ${row.ticker} ${row.direction.toUpperCase()}?\n\nContract: ${tsSymbol}\nEntry: $${optEntry.toFixed(2)}\nTP1: $${optTp1.toFixed(2)} (+25%)\nTP2: $${optTp2.toFixed(2)} (+50%)\n\n${trigStr}\n${stopStr}\n\nAccount: 11975462 LIVE`)) return;

  if (btn) { btn.disabled = true; btn.textContent = '⏳ submitting…'; }
  const body = {
    ticker: row.ticker,
    symbol: tsSymbol,
    direction,
    qty: 1,

    tp1: optTp1,
    tp2: optTp2,
    structuralStop: (stop.symbol && stop.price) ? {
      symbol: stop.symbol,
      predicate: stop.predicate || (row.direction === 'long' ? 'below' : 'above'),
      price: parseFloat(stop.price),
    } : null,
    live: true,
    source: 'action-' + row.ticker + (useTrigger ? '-queued' : '-firenow'),
  };
  if (useTrigger && sug.stockTrigger) {
    body.trigger = { symbol: row.ticker, predicate: row.direction === 'long' ? 'above' : 'below', price: parseFloat(sug.stockTrigger) };
  }
  try {
    const resp = await fetch('/api/take-trade', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Stratum-Secret': sec },
      body: JSON.stringify(body),
    });
    const j = await resp.json();
    if (resp.status === 200) {
      const ok = (j.brackets || []).filter(x => x.ok).length;
      alert(`✅ ${ok}/${(j.brackets || []).length} bracket(s) ${useTrigger ? 'QUEUED' : 'FIRED'} on TS LIVE\nDollar risk: $${j.dollarRisk}`);
    } else {
      alert(`❌ TS fire failed: ${j.error || 'HTTP ' + resp.status}`);
    }
  } catch (e) {
    alert(`❌ TS network error: ${e.message}`);
  }
  if (btn) { btn.disabled = false; btn.textContent = useTrigger ? '🎯 TS QUEUE' : '⚡ TS FIRE'; }
}
window.dispatchActionToTS = dispatchActionToTS;

// Public 1ct fire from ACTION row
function dispatchActionToPublic(row, btn) {
  if (!row || !row.suggested || !row.suggested.contract) return alert('No contract for ' + row.ticker);
  return dispatchToPublic({
    ticker: row.ticker,
    direction: row.direction === 'long' ? 'CALL' : 'PUT',
    trigger: parseFloat(row.suggested.stockTrigger) || 0,
  }, btn);
}
window.dispatchActionToPublic = dispatchActionToPublic;

// Public synthetic bracket from ACTION row
function dispatchActionToBracket(row, btn) {
  if (!row || !row.suggested || !row.suggested.contract) return alert('No contract for ' + row.ticker);
  const sug = row.suggested;
  const stop = sug.structuralStop || {};
  return dispatchToBracket({
    ticker: row.ticker,
    direction: row.direction === 'long' ? 'CALL' : 'PUT',
    trigger: parseFloat(sug.stockTrigger) || 0,
    stop: parseFloat(stop.price) || 0,

  }, btn);
}

async function loadCoilData() {

  const ready = coilData.ready || [];
  const watching = coilData.watching || [];

  // Phase 4.17 — TA verify each coil row
  try { await buildTaForRows([...ready, ...watching, ...prep], r => r.ticker, r => r.direction); } catch (e) {}
  // Phase 4.29 — FIRE GRADE composite (replaces broken conviction score)
  try { await buildFireGradeForRows([...ready, ...watching, ...prep], r => r.ticker, r => r.direction, 'SWING'); } catch (e) {}
  document.getElementById("scan-date").textContent = "Coil Scan · " + new Date(coilData.generatedAt || Date.now()).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });

let wpData = null;

async function loadWPData() {
  FILTERS = FILTERS_WP;
  if (!FILTERS_WP.find(f => f.id === activeFilter)) activeFilter = defaultFilterIdFor(FILTERS_WP);
  try {
    if (!wpData) document.getElementById("grid").innerHTML = `<div class="empty">Loading WP scan... 4HR EMA setups across universe.<br><span style="font-size:11px;">First run takes ~25s — pulls 4HR bars + computes 9/21 EMA + multi-TF alignment.</span></div>`;
    const r = await fetch("/api/wp-scan", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    wpData = await r.json();
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">Could not load WP scan: <code>${e.message}</code></div>`;
    document.getElementById("stats").innerHTML = "";
    document.getElementById("filters").innerHTML = "";
    return;
  }

  // ALSO pull weekly coil setups and merge them into the WP grid (Sniper-style
  // "fire weekly consolidation" picks). Cards get isWeekly:true flag so the
  // renderer can show the TF badge + daily-break-required line.
  try {
    const wr = await fetch("/api/coil-scan", { cache: "no-store" });
    if (wr.ok) {
      const coilData = await wr.json();
      const weeklyPool = [].concat(coilData.ready || [], coilData.watching || [], coilData.prep || []);
      const weeklySetups = weeklyPool.filter(s => s.tf === "Weekly" && s.plan && s.plan.primary);
      // Map weekly coil shape -> WP card shape
      const mapped = weeklySetups.map(s => {
        const pp = (s.plan && s.plan.primary) || {};
        const trig = pp.trigger;
        const tp2Pct = (trig && pp.tp2) ? Math.round(((pp.tp2 - trig) / trig * 100) * (s.direction === "short" ? -1 : 1) * 10) / 10 : null;
        return {
          ticker: s.ticker,
          isWeekly: true,
          weeklyPattern: s.pattern,
          weeklySequence: s.sequence,
          dailyBreakRequired: trig,
          measuredMovePct: tp2Pct,
          signal: s.direction === "long" ? "weekly-coil-long" : "weekly-coil-short",
          direction: s.direction,
          conviction: s.conviction,
          lastClose: s.lastClose,
          holdRating: s.holdRating,
          plan: {
            entry: trig,
            stop: pp.stop,
            tp1: pp.tp1,
            tp2: pp.tp2,
            risk: pp.risk,
            rr1: s.plan.rr1,
            rr2: s.plan.rr2,
          },
          coilAligned: false,
          dailyAligned: false,
          counterTrendDaily: false,
          johnPrecedent: 0,
          ema9: null,
          ema21: null,
          volumeContext: s.volumeContext,
        };
      });
      // Bucket by conviction same as wpScanner: >=7 ready, 5-6 trial, <5 dropped
      mapped.forEach(m => {
        if (m.conviction >= 7) (wpData.ready = wpData.ready || []).push(m);
        else if (m.conviction >= 5) (wpData.trial = wpData.trial || []).push(m);
      });
    }
  } catch (e) { /* coil merge optional — don't block WP if it fails */ }

  const ready = wpData.ready || [];
  const trial = wpData.trial || [];
  // Phase 4.17 — verify TA on each WP setup (4HR pattern but TA verifies 5m alignment)
  try { await buildTaForRows([...ready, ...trial], r => r.ticker, r => r.direction); } catch (e) {}
  // Phase 4.22 — multi-test breakout flag (long-only)
  try { await buildMultiTestBreakoutForRows([...ready, ...trial], r => r.ticker, r => r.direction, '60m'); } catch (e) {}
  // Phase 4.29 — FIRE GRADE composite (replaces broken conviction score)
  try { await buildFireGradeForRows([...ready, ...trial], r => r.ticker, r => r.direction, 'SWING'); } catch (e) {}
  document.getElementById("scan-date").textContent = "WP Swing Scan · " + new Date(wpData.generatedAt || Date.now()).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  document.getElementById("meta").textContent = `${ready.length + trial.length} setups · ${(wpData.scanned || 0)} scanned · acct $${(wpData.accountSize || 20000).toLocaleString()}`;
  renderStatsWP();
  renderFilters();
  renderTabs();
  renderGridWP();
}

function renderStatsWP() {
  const ready = wpData.ready || [];
  const trial = wpData.trial || [];
  const max = ready.filter(r => r.conviction >= 9).length;
  const standard = ready.filter(r => r.conviction >= 7 && r.conviction < 9).length;
  const stats = [
    { k: "🚀 MAX",     v: max,           cls: "green" },
    { k: "🔥 Ready",   v: ready.length,  cls: "" },
    { k: "🟡 Trial",   v: trial.length,  cls: "" },
    { k: "FTFC",       v: ready.filter(r => r.dailyAligned).length, cls: "green" },
    { k: "Coil+WP",    v: ready.filter(r => r.coilAligned).length, cls: "" },
    { k: "Long",       v: [...ready, ...trial].filter(r => r.direction === "long").length, cls: "green" },
    { k: "Short",      v: [...ready, ...trial].filter(r => r.direction === "short").length, cls: "red" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

async function refreshWPScan() {
  const btn = document.getElementById("wp-refresh-btn");
  if (btn) { btn.disabled = true; btn.textContent = "🌊 Scanning..."; }
  try {
    const r = await fetch("/api/wp-scan/run", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
    const data = await r.json();
    if (data.skipped) { alert("Scan already running, please wait."); return; }
    wpData = data;
    renderStatsWP();
    renderGridWP();
  } catch (e) { alert("Refresh failed: " + e.message); }
  finally { if (btn) { btn.disabled = false; btn.textContent = "🌊 Re-scan"; } }
}
window.refreshWPScan = refreshWPScan;

// Computes recommended sizing on the fly given a card's conviction + premium hint
async function getWPSizing(conviction, premium, turbo) {
  try {
    const r = await fetch("/api/wp-scan/size", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ conviction, premium, turboOverride: !!turbo, overrideKeyword: turbo ? 'YES_AAA' : '' }),
    });
    const data = await r.json();
    return data.sizing || { skip: true };
  } catch (e) { return { skip: true, error: e.message }; }
}

    johnLikePicksData = await r.json();
  } catch (e) { /* not loaded yet — fine */ }
}

async function loadJSData() {
  FILTERS = FILTERS_JS;
  if (!FILTERS_JS.find(f => f.id === activeFilter)) activeFilter = defaultFilterIdFor(FILTERS_JS);
  try {
    if (!jsData) document.getElementById("grid").innerHTML = `<div class="empty">Loading JS scan... reversal patterns John actually uses.<br><span style="font-size:11px;">Failed-2D · Failed-2U · 2D-2U · 2U-2D · Inside-week</span></div>`;
    const r = await fetch("/api/js-scan", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    jsData = await r.json();
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">Could not load JS scan: <code>${e.message}</code></div>`;
    document.getElementById("stats").innerHTML = "";
    document.getElementById("filters").innerHTML = "";
    return;
  }
  // Phase 4.30D — load JOHN-LIKE picks alongside JS scan
  await loadJohnLikePicks();
  const all = [].concat(jsData.ready || [], jsData.watching || [], jsData.prep || []);
  // Phase 4.17 — TA verify each pattern row
  try { await buildTaForRows(all, r => r.ticker, r => r.direction); } catch (e) {}
  // Phase 4.22 — multi-test breakout flag (long-only)
  try { await buildMultiTestBreakoutForRows(all, r => r.ticker, r => r.direction, '60m'); } catch (e) {}
  // Phase 4.29 — FIRE GRADE composite (replaces broken conviction score)
  try { await buildFireGradeForRows(all, r => r.ticker, r => r.direction, 'SWING'); } catch (e) {}
  document.getElementById("scan-date").textContent = "JS Pattern Scan · " + new Date(jsData.generatedAt || Date.now()).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  document.getElementById("meta").textContent = `${all.length} patterns · ${jsData.scanned || 0} scanned · ${Object.keys(jsData.byPattern || {}).length} pattern types`;
  renderStatsJS();
  renderFilters();
  renderTabs();
  renderGridJS();
}

function renderStatsJS() {
  const ready = jsData.ready || [];
  const watching = jsData.watching || [];
  const byP = jsData.byPattern || {};
  const stats = [
    { k: "🔥 Ready",       v: ready.length,                                           cls: "green" },
    { k: "🟡 Watching",    v: watching.length,                                        cls: "" },
    { k: "Failed 2D",      v: byP["failed-2D"] || 0,                                  cls: "green" },
    { k: "Failed 2U",      v: byP["failed-2U"] || 0,                                  cls: "red" },
    { k: "2D-2U Rev",      v: byP["2D-2U"] || 0,                                      cls: "green" },
    { k: "2U-2D Rev",      v: byP["2U-2D"] || 0,                                      cls: "red" },
    { k: "Inside Wk",      v: byP["inside-week"] || 0,                                cls: "" },
    { k: "Long",           v: [...ready, ...watching].filter(r => r.direction === "long").length,  cls: "green" },
    { k: "Short",          v: [...ready, ...watching].filter(r => r.direction === "short").length, cls: "red" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

async function refreshJSScan() {
  const btn = document.getElementById("js-refresh-btn");
  if (btn) { btn.disabled = true; btn.textContent = "🎯 Scanning..."; }
  try {
    const r = await fetch("/api/js-scan/run", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
    const data = await r.json();
    if (data.skipped) { alert("Scan already running, please wait."); return; }
    jsData = data;
    renderStatsJS();
    renderGridJS();
  } catch (e) { alert("Refresh failed: " + e.message); }
  finally { if (btn) { btn.disabled = false; btn.textContent = "🎯 Re-scan"; } }
}

let lottoData = null;

// Cache hold-overnight ratings by ticker so we don't re-query every render
const _holdCache = new Map();
async function getHoldRating(ticker, direction) {
  if (!ticker) return null;
  const key = ticker + ':' + (direction || 'LONG');
  if (_holdCache.has(key)) return _holdCache.get(key);
  try {
    const r = await fetch(`/api/safe-to-hold/${encodeURIComponent(ticker)}?direction=${encodeURIComponent(direction || 'LONG')}`, { cache: 'no-store' });
    if (!r.ok) return null;
    const data = await r.json();
    _holdCache.set(key, data);
    // Clear cache after 5 min so it refreshes naturally
    setTimeout(() => _holdCache.delete(key), 5 * 60 * 1000);
    return data;
  } catch (e) { return null; }
}
window.getHoldRating = getHoldRating;

function holdPill(rating) {
  if (!rating) return '';
  const r = rating.rating || 'CAUTION';
  const icon = r === 'SAFE' ? '🟢' : r === 'CAUTION' ? '🟡' : '🔴';
  const bg = r === 'SAFE' ? 'rgba(76,175,80,0.18)' : r === 'CAUTION' ? 'rgba(255,193,7,0.18)' : 'rgba(255,59,59,0.18)';
  const fg = r === 'SAFE' ? '#4caf50' : r === 'CAUTION' ? '#ffc107' : '#ff3b3b';
  const tooltip = (rating.reasons || []).map(x => x.msg).slice(0, 6).join(' • ');
  return `<span class="tag" style="background:${bg};color:${fg};font-size:10px;" title="${tooltip}">${icon} HOLD ${r}</span>`;
}
window.holdPill = holdPill;

async function loadLottoData() {
  FILTERS = FILTERS_LOTTO;
  // Reset activeFilter if it's not a LOTTO filter id (avoids cross-tab residue)
  if (!FILTERS_LOTTO.find(f => f.id === activeFilter)) activeFilter = defaultFilterIdFor(FILTERS_LOTTO);
  try {
    if (!lottoData) document.getElementById("grid").innerHTML = `<div class="empty">Loading lotto feed...</div>`;
    const r = await fetch("/api/lotto-feed?limit=30", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    lottoData = data;
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">Could not load lotto feed: <code>${e.message}</code></div>`;
    document.getElementById("stats").innerHTML = "";
    document.getElementById("filters").innerHTML = "";
    return;
  }
  document.getElementById("scan-date").textContent = "Lotto Feed · " + new Date(lottoData.updatedAt || Date.now()).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  // Phase 4.17 — TA verify each Lotto pick
  try { await buildTaForRows(lottoData.picks || [], r => r.ticker, r => (r.direction || 'CALL').toLowerCase() === 'call' ? 'long' : 'short'); } catch (e) {}
  // Phase 4.29 — FIRE GRADE composite (LOTTO trade type)
  try { await buildFireGradeForRows(lottoData.picks || [], r => r.ticker, r => (r.direction || 'CALL').toLowerCase() === 'call' ? 'long' : 'short', 'LOTTO'); } catch (e) {}
  const picks = lottoData.picks || [];
  const todayPicks = picks.filter(p => {
    const d = new Date(p.postedAt);
    const today = new Date();
    return d.toISOString().slice(0,10) === today.toISOString().slice(0,10);
  });
  document.getElementById("meta").textContent = `${picks.length} recent picks · ${todayPicks.length} today · last ${lottoData.freshnessDays}d`;
  renderStatsLotto();
  renderFilters();
  renderTabs();
  renderGridLotto();
}

function renderStatsLotto() {
  const picks = lottoData.picks || [];
  const calls = picks.filter(p => p.direction === "CALL").length;
  const puts  = picks.filter(p => p.direction === "PUT").length;
  const today = picks.filter(p => {
    const d = new Date(p.postedAt);
    return d.toISOString().slice(0,10) === new Date().toISOString().slice(0,10);
  }).length;
  const stats = [
    { k: "Total",  v: picks.length, cls: "" },
    { k: "Today",  v: today,        cls: "green" },
    { k: "Calls",  v: calls,        cls: "aqua" },
    { k: "Puts",   v: puts,         cls: "red" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

// LOTTO dispatchers — find the pick by ticker, fire Public or Bracket
async function dispatchLottoToPublic(ticker, btn) {
  const p = (lottoData && lottoData.picks || []).find(x => x.ticker === ticker);
  if (!p) { btn.textContent = '❌ no pick'; return; }
  return dispatchToPublic({
    ticker: p.ticker,
    direction: p.direction,
    contract: null,                  // John picks don't have OPRA — fire as equity for now
    trigger: p.stockEntry,
    stop: p.stockStop,
  }, btn);
}
window.dispatchLottoToPublic = dispatchLottoToPublic;

async function dispatchLottoToBracket(ticker, btn) {
  const p = (lottoData && lottoData.picks || []).find(x => x.ticker === ticker);
  if (!p) { btn.textContent = '❌ no pick'; return; }
  // Lotto bracket: tp1 = +25%, tp2 = +50% in stock terms (default John ladder)
  const tp1 = p.stockEntry ? p.stockEntry * 1.25 : null;
  const tp2 = p.stockEntry ? p.stockEntry * 1.50 : null;
  return dispatchToBracket({
    ticker: p.ticker,
    direction: p.direction,
    contract: null,
    trigger: p.stockEntry,
    stop: p.stockStop,
    tp1: tp1,
    tp2: tp2,
  }, btn);
}

const STAR_STORE_KEY = "scanner_starred_v1";

function getStars() {
  try { return JSON.parse(localStorage.getItem(STAR_STORE_KEY) || "{}"); }
  catch (e) { return {}; }
}
function setStars(obj) { localStorage.setItem(STAR_STORE_KEY, JSON.stringify(obj)); }
function isStarred(ticker) { const s = getStars(); return !!s[ticker]; }
function toggleStar(ticker, source) {
  const s = getStars();
  if (s[ticker]) { delete s[ticker]; }
  else { s[ticker] = { ticker, source: source || "manual", starredAt: new Date().toISOString() }; }
  setStars(s);
  // Re-render current tab to update star button visuals
  if (typeof loadActiveTab === "function") loadActiveTab();
}

// =============================================================================
// 🍽️ AYCE tab — 5 ATH strategies (Miyagi 12HR / 4HR Re-Trigger / 3-2-2 First
// Live / 7HR Liquidity Sweep / Failed 9). Time-of-day-anchored patterns —
// fires at 9:30 ET (most), 10 AM ET (3-2-2), or after 11 AM ET (7HR sweep).
// =============================================================================
let ayceData = null;

async function loadAYCEData() {
  FILTERS = FILTERS_AYCE;
  if (!FILTERS_AYCE.find(f => f.id === activeFilter)) activeFilter = defaultFilterIdFor(FILTERS_AYCE);
  try {
    if (!ayceData) document.getElementById("grid").innerHTML = `<div class="empty">Loading AYCE scanner... (60s — scanning ~50 tickers across 5 strategies)</div>`;
    const r = await fetch("/api/ayce-scan/last", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    ayceData = data;
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">No AYCE scan yet. <button onclick="runAYCEScan()" class="pill-mini" style="background:#5cf;">Run Scan Now</button></div>`;
    document.getElementById("stats").innerHTML = "";
    document.getElementById("filters").innerHTML = "";
    return;
  }
  const hits = ayceData.hits || [];
  const stratCount = hits.reduce((acc, h) => acc + (h.strategies||[]).length, 0);
  const armed = hits.reduce((acc, h) => acc + (h.strategies||[]).filter(s => s.status==='armed'||s.status==='live-armed'||s.status==='live-fired').length, 0);
  // Phase 4.17 — TA verify each AYCE hit (primary armed strategy direction)
  try {
    await buildTaForRows(hits, h => h.ticker, h => {
      const strats = h.strategies || [];
      const primary = strats.find(s => s.status === 'armed' || s.status === 'live-armed' || s.status === 'live-fired') || strats[0];
      return primary && primary.direction;
    });
  } catch (e) {}
  // Phase 4.29 — FIRE GRADE composite per AYCE hit (using primary strategy direction)
  try {
    await buildFireGradeForRows(hits, h => h.ticker, h => {
      const strats = h.strategies || [];
      const primary = strats.find(s => s.status === 'armed' || s.status === 'live-armed' || s.status === 'live-fired') || strats[0];
      return primary && primary.direction;
    }, 'SWING');
  } catch (e) {}
  document.getElementById("scan-date").textContent = "AYCE Scan · " + new Date(ayceData.scannedAt || Date.now()).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  document.getElementById("meta").textContent = `${hits.length} tickers · ${stratCount} strategies · ${armed} armed · <button onclick="runAYCEScan()" class="pill-mini" style="background:rgba(92,207,255,0.2);color:#5cf;">↻ Re-scan</button>`;
  renderStatsAYCE();
  renderFilters();
  renderTabs();
  renderGridAYCE();
}

async function runAYCEScan() {
  document.getElementById("grid").innerHTML = `<div class="empty">Running universe scan... (60s)</div>`;
  try {
    const r = await fetch("/api/ayce-scan/run", { method: "POST" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    ayceData = await r.json();
    loadAYCEData();
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">Scan error: <code>${e.message}</code></div>`;
  }
}
window.runAYCEScan = runAYCEScan;

function renderStatsAYCE() {
  const hits = ayceData.hits || [];
  const allStrats = hits.flatMap(h => (h.strategies||[]).map(s => ({ticker: h.ticker, ...s})));
  const counts = {
    'Miyagi-12HR': allStrats.filter(s => s.name === 'Miyagi-12HR').length,
    '4HR-Retrigger': allStrats.filter(s => s.name === '4HR-Retrigger').length,
    '3-2-2-First-Live': allStrats.filter(s => s.name === '3-2-2-First-Live').length,
    '7HR-Liquidity-Sweep': allStrats.filter(s => s.name === '7HR-Liquidity-Sweep').length,
    'Failed-9': allStrats.filter(s => s.name === 'Failed-9').length,
  };
  const stats = [
    { k: "Tickers", v: hits.length, cls: "" },
    { k: "🥋 Miyagi", v: counts['Miyagi-12HR'], cls: "aqua" },
    { k: "🔄 4HR-Retrig", v: counts['4HR-Retrigger'], cls: "aqua" },
    { k: "🎯 3-2-2", v: counts['3-2-2-First-Live'], cls: "" },
    { k: "🌊 7HR-Sweep", v: counts['7HR-Liquidity-Sweep'], cls: "" },

  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

async function loadStarredData() {
  FILTERS = FILTERS_STARRED;
  const stars = getStars();
  const tickers = Object.keys(stars);

  document.getElementById("scan-date").textContent = "Starred Watchlist";
  document.getElementById("meta").textContent = `${tickers.length} starred ticker${tickers.length === 1 ? '' : 's'}`;

  if (!tickers.length) {
    document.getElementById("grid").innerHTML = `<div class="empty">No starred tickers yet.<br><span style="font-size:11px;">Click ☆ on any card in SCAN / MOVERS / LVL / TOMORROW to star it. Starred tickers persist locally on this device.</span></div>`;
    document.getElementById("stats").innerHTML = `<div class="stat"><span class="stat-key">Stars</span><span class="stat-val mono">0</span></div>`;
    document.getElementById("filters").innerHTML = "";
    return;
  }

  // Pull in parallel: setup-radar (for tomorrow data), latest scan, latest movers
  // Use existing endpoints to enrich starred tickers with whatever we know about them.
  let scanArr = [], moversArr = [], radarFlat = [];
  try {
    const [scanR, moversR, radarR] = await Promise.all([
      fetch("/api/scan-result", { cache: "no-store" }).catch(() => null),
      fetch("/api/movers", { cache: "no-store" }).catch(() => null),
      fetch("/api/setup-radar", { cache: "no-store" }).catch(() => null),
    ]);
    if (scanR && scanR.ok) {
      const j = await scanR.json();
      scanArr = (j.candidates || j.results || j || []).map(x => Object.assign({ _source: "scan" }, x));
    }
    if (moversR && moversR.ok) {
      const j = await moversR.json();
      moversArr = (j.movers || j.results || j || []).map(x => Object.assign({ _source: "movers" }, x));
    }
    if (radarR && radarR.ok) {
      const r = await radarR.json();
      [...(r.ready || []), ...(r.forming || [])].forEach(x => radarFlat.push(Object.assign({ _source: "tomorrow", _state: r.ready.includes(x) ? "ready" : "forming" }, x)));
    }
  } catch (e) { /* swallow — partial data is fine */ }

  // For each starred ticker, find the best record across sources (priority: tomorrow > scan > movers)
  const cards = tickers.map(t => {
    const tom = radarFlat.find(x => (x.ticker || x.symbol) === t);
    if (tom) return tom;
    const sc = scanArr.find(x => (x.ticker || x.symbol) === t);
    if (sc) return sc;
    const mv = moversArr.find(x => (x.ticker || x.symbol) === t);
    if (mv) return mv;
    // Fallback: stub card
    return { ticker: t, _source: "manual", _stub: true, starredAt: stars[t].starredAt };
  });

  starredCache = cards;

  renderStatsStarred();
  renderFilters();
  renderTabs();
  renderGridStarred();
}

async function loadLvlData() {
  FILTERS = FILTERS_LVL;
  try {
    if (!lvlData) document.getElementById("grid").innerHTML = `<div class="empty">Computing LVL state across universe...<br><span style="font-size:11px;">First run takes ~30s (143 tickers × 2 timeframes).</span></div>`;
    const r = await fetch("/api/lvl-scan?tfs=Daily,1H", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || "lvl-scan failed");

    // Backfill errored entries with per-ticker direct call (TS rate limits sometimes
    // 429 part of the bulk scan — small caps especially affected). Limit to 8 retries
    // in parallel so we don't re-trigger the same rate limit.
    const errored = (data.results || []).filter(r => !r.tfs || Object.values(r.tfs || {}).every(s => !s || !s.ok));
    if (errored.length && errored.length <= 12) {
      console.log('[LVL] backfilling', errored.length, 'errored tickers via per-ticker endpoint');
      await Promise.all(errored.slice(0, 12).map(async r => {
        try {
          const r2 = await fetch(`/api/lvl-scan/${encodeURIComponent(r.symbol)}?tfs=Daily,1H`, { cache: "no-store" });
          if (!r2.ok) return;
          const d2 = await r2.json();
          if (d2 && d2.tfs) r.tfs = d2.tfs;
        } catch (e) { /* swallow — best effort */ }
      }));
    }

    // Annotate each result with derived flags used by filters
    (data.results || []).forEach(r => {
      const tfStates = Object.values(r.tfs || {}).filter(s => s && s.ok);
      r._anyEnterNow = tfStates.some(s => s.signal === 'LVL_LONG_25' || s.signal === 'LVL_SHORT_75');
      r._anyArmed    = tfStates.some(s => ['LVL_LONG_25','EARLY_LONG','LVL_SHORT_75','EARLY_SHORT','HIGH_BREAK','LOW_BREAK'].includes(s.signal));
      r._anyStopped  = tfStates.some(s => s.signal === 'STOP_HIT');
      // Active rawSignal (for stopped setups that still show direction/levels)
      r._anyRawActive = tfStates.some(s => s.rawSignal && s.rawSignal !== 'NONE' && ['LVL_LONG_25','EARLY_LONG','LVL_SHORT_75','EARLY_SHORT','HIGH_BREAK','LOW_BREAK'].includes(s.rawSignal));
      const dirs = tfStates.map(s => s.direction).filter(d => d && d !== 'NONE');
      r._dominantDirection = dirs[0] || 'NONE';
      r._aligned = dirs.length >= 2 && dirs.every(d => d === dirs[0]);
    });
    lvlData = data;
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">
      Could not load LVL scan: <code>${e.message}</code>
    </div>`;
    return;
  }
  document.getElementById("scan-date").textContent =
    "LVL Scan · " + new Date(lvlData.timestamp).toLocaleString("en-US", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
  document.getElementById("meta").textContent =
    `${lvlData.universe} scanned · ${lvlData.summary.withSignals} active · ${lvlData.summary.aligned} aligned`;
  renderStatsLvl();
  renderFilters();
  renderTabs();
  renderGridLvl();
}

  const r = lvlData.results[idx];
  const state = r.tfs[tf];
  if (!state || !state.ok || !state.plan) { btn.textContent = "❌ No plan"; return; }
  const plan = state.plan;
  const isLong = state.direction === 'LONG';
  const live = account === "LIVE";

  // Phase 4.16 + 4.21 — TA + chart-vision gate. LVL TFs map to LOTTO (5m/15m), DAY (1H), or SWING (4HR/Daily).
  if (r && r.symbol) {
    const taOk = await taGateOrAbort(r.symbol, isLong ? 'long' : 'short');
    if (!taOk) return;
    const lvlTradeType = (tf === '5m' || tf === '15m') ? 'LOTTO' : (tf === '1H' || tf === '60' || tf === '4HR' || tf === '240') ? 'DAY' : 'SWING';
    const visionOk = await chartVisionGateOrAbort(r.symbol, isLong ? 'long' : 'short', lvlTradeType);
    if (!visionOk) return;
  }

  const banner = live ? `🚨 LIVE ORDER 🚨\n\n` : `🧪 SIM ORDER\n`;
  if (!confirm(`${banner}\n${isLong?'BUY':'SHORT'} ${r.symbol} 2 ct @ ${fmtNum(plan.entry)} LMT\nStop: ${fmtNum(plan.stop)} | TP1: ${fmtNum(plan.tp1)} | TP2: ${fmtNum(plan.tp2)}\nLVL ${tf} ${state.signal}\n\n${live ? "Confirm LIVE?" : "Place SIM?"}`)) return;

  const secret = getStratumSecret();
  if (!secret) { btn.textContent = "❌ Secret required"; return; }

  const orig = btn.textContent;
  btn.textContent = "Placing...";
  btn.disabled = true;

  try {
    const resp = await fetch("/api/scanner-fire", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-stratum-secret": secret },
      body: JSON.stringify({
        ticker:     r.symbol,
        direction:  isLong ? "BULLISH" : "BEARISH",
        entry:      plan.entry,
        stop:       plan.stop,
        tp1:        plan.tp1,
        tp2:        plan.tp2,
        qty:        2,
        live:       live,
        orderType:  "STOCK",
      }),
    });
    const data = await resp.json();
    if (data.ok) {
      btn.textContent = `✓ ${live ? "LIVE" : "SIM"} placed`;
      btn.style.background = "linear-gradient(180deg, #14e87a, #0fb960)";
      btn.style.color = "#07090f";
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ""; btn.style.color = ""; }, 4000);
    } else {
      btn.textContent = "❌ " + (data.error || "fail").slice(0, 60);
      btn.style.background = "var(--red-soft)";
      btn.style.color = "var(--red)";
      if (resp.status === 401) localStorage.removeItem("stratumSecret");
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.background = ""; btn.style.color = ""; }, 4000);
    }
  } catch (e) {
    btn.textContent = "❌ " + e.message.slice(0, 40);
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 3000);
  }
}

async function loadScanData() {
  FILTERS = FILTERS_SCAN;
  const params = new URLSearchParams(window.location.search);
  const direction = params.get("direction") || "both";
  const force = params.get("force") === "1" ? "&force=1" : "";
  const src = `/api/wealthprince-scan?direction=${direction}${force}`;
  try {
    if (!scan) document.getElementById("grid").innerHTML = `<div class="empty">Loading WP scan...</div>`;
    const r = await fetch(src, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    scan = data;
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">
      Could not load WP scan: <code>${e.message}</code><br><br>
      <span style="font-size:11px;">Try <a style="color: var(--aqua); text-decoration:none;" href="?force=1">force refresh</a>.</span>
    </div>`;
    return;
  }
  document.getElementById("scan-date").textContent =
    "WP Scan · " + (scan.timestamp ? new Date(scan.timestamp).toLocaleString("en-US", {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"}) : "—");
  document.getElementById("meta").textContent =
    `${scan.scanned || "?"} scanned · ${scan.candidatesFound || scan.candidates?.length || 0} candidates`;
  renderStatsScan();
  renderFilters();
  renderTabs();
  renderGrid();
}

async function loadMoversData() {
  FILTERS = FILTERS_MOVERS;
  try {
    if (!movers) document.getElementById("grid").innerHTML = `<div class="empty">Loading Live Movers...</div>`;
    const r = await fetch("/api/live-movers", { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    movers = data;
    // Phase 4.17 — TA verify each mover (long if up-mover, short if down-mover)
    try {
      await buildTaForRows(movers.movers || [], r => r.ticker, r => (r.pctChange > 0 ? 'long' : 'short'));
    } catch (e) { /* fail open */ }
    // Phase 4.22 — multi-test breakout (only meaningful for up-movers)
    try {
      const ups = (movers.movers || []).filter(m => m.pctChange > 0);
      await buildMultiTestBreakoutForRows(ups, r => r.ticker, () => 'long', '60m');
    } catch (e) { /* fail open */ }
    // Phase 4.29 — FIRE GRADE composite (DAY trade type for movers)
    try {
      await buildFireGradeForRows(movers.movers || [], r => r.ticker, r => (r.pctChange > 0 ? 'long' : 'short'), 'DAY');
    } catch (e) { /* fail open */ }
    // Phase 4.23 — bulk VPOC fetch for all movers. Async; re-render when data lands.
    try {
      fetchVpForRows(movers.movers || [], r => r.ticker, { tf: 'Daily', lookback: 20 }).then(() => {
        try { if (activeTab === 'movers') renderGridMovers(); } catch (e) {}
      });
    } catch (e) {}
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">
      Could not load Live Movers: <code>${e.message}</code>
    </div>`;
    return;
  }
  document.getElementById("scan-date").textContent =
    "Live Movers · " + (movers.timestamp ? new Date(movers.timestamp).toLocaleString("en-US", {hour:"2-digit", minute:"2-digit", second:"2-digit"}) : "live");
  document.getElementById("meta").textContent =
    `${movers.universeSize || 60} scanned · ${(movers.movers || []).length} movers`;
  // DEBUG: trace each step so we can find where it dies
  const trace = [];
  try { renderStatsMovers(); trace.push("stats:OK"); } catch(e) { trace.push("stats:ERR " + e.message); }
  try { renderFilters();     trace.push("filters:OK"); } catch(e) { trace.push("filters:ERR " + e.message); }
  try { renderTabs();        trace.push("tabs:OK"); } catch(e) { trace.push("tabs:ERR " + e.message); }
  try { renderGridMovers();  trace.push("grid:OK"); } catch(e) { trace.push("grid:ERR " + e.message); }
  // If grid still says "Loading" or anything other than cards, expose the trace
  const gridEl = document.getElementById("grid");
  if (!gridEl.querySelector(".card") && !gridEl.querySelector(".empty")) {
    gridEl.innerHTML = `<div class="empty">Trace: ${trace.join(" → ")}</div>`;
  } else if (gridEl.textContent.includes("Loading Live Movers")) {
    gridEl.innerHTML = `<div class="empty">Trace (still loading): ${trace.join(" → ")}</div>`;
  }
}

function renderStatsScan() {
  const cands = scan.candidates || [];
  const longs  = cands.filter(c => c.direction === "CALL").length;
  const shorts = cands.filter(c => c.direction === "PUT").length;
  const cleared = cands.filter(c => !EARNINGS_BLOCK.has(c.ticker)).length;
  const topScore = cands.reduce((m, c) => Math.max(m, c.score || 0), 0);
  const stats = [
    { k: "Candidates", v: cands.length, cls: "" },
    { k: "Calls", v: longs, cls: "green" },
    { k: "Puts", v: shorts, cls: "red" },
    { k: "Earnings clear", v: cleared, cls: "aqua" },
    { k: "Top score", v: topScore, cls: "" },
    { k: "Universe", v: scan.universeSize || "—", cls: "" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

function renderStatsMovers() {
  const ms = movers.movers || [];
  const ups = ms.filter(m => m.pctChange > 0).length;
  const downs = ms.filter(m => m.pctChange < 0).length;
  const big = ms.filter(m => Math.abs(m.pctChange) >= 3).length;
  const highVol = ms.filter(m => (m.volRatio || 0) >= 1.5).length;
  const top = ms[0];
  const stats = [
    { k: "Movers", v: ms.length, cls: "" },
    { k: "Up", v: ups, cls: "green" },
    { k: "Down", v: downs, cls: "red" },
    { k: "3%+", v: big, cls: "aqua" },
    { k: "1.5x Vol", v: highVol, cls: "" },
    { k: "Top", v: top ? top.ticker : "—", cls: "" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><span class="stat-key">${s.k}</span><span class="stat-val ${s.cls} mono">${s.v}</span></div>`
  ).join("");
}

// Backwards-compat alias: old renderStats() now dispatches by tab
function renderStats() {
  return activeTab === "movers" ? renderStatsMovers() : renderStatsScan();
}

// =============================================================================
// LIVE MOVERS GRID
// =============================================================================
function renderGridMovers() {
  try {
  const ms = movers.movers || [];
  const filter = FILTERS.find(f => f.id === activeFilter) || FILTERS[0];
  const filtered = ms.filter((c, i) => filter.test(c, i));
  if (!filtered.length) {
    document.getElementById("grid").innerHTML = `<div class="empty">No movers match this filter.</div>`;
    return;
  }
  document.getElementById("grid").innerHTML = filtered.map((m, i) => {
    const isUp = m.pctChange > 0;
    const isCall = isUp;
    const isEarnings = EARNINGS_BLOCK.has(m.ticker);
    const cd = getCandleCountdown("Daily");
    // For movers: use intraday H/L as the trigger zone
    const trigger = isCall ? m.high : m.low;
    const stop    = isCall ? m.low  : m.high;
    const r       = Math.abs(trigger - stop);
    const tp1     = isCall ? trigger + r : trigger - r;
    const spot    = m.last;
    const directional = isCall ? (spot - trigger) : (trigger - spot);
    const rMultiple = r > 0 ? directional / r : 0;

    // ===== Exhaustion classifier (Apr 29, AB call-out) =====
    // INTC at +10.75% would have shown "STILL GOOD" before this -- chase trap.
    // Now: heavy moves get an EXHAUSTED / LATE flag that overrides r-multiple verdict.
    const pctMove = Math.abs(m.pctChange || 0);
    const rangePct = m.rangePct || 0;
    const EXHAUST_PCT = 7.0;
    const LATE_PCT    = 4.0;
    const EXHAUST_RANGE = 7.0;

    let verdict, color, msg, sub, icon;
    if (pctMove >= EXHAUST_PCT || rangePct >= EXHAUST_RANGE) {
      verdict = "EXHAUSTED"; color = "red"; icon = "⛔";
      msg = `${pctMove.toFixed(1)}% move done · range ${rangePct.toFixed(1)}%`;
      sub = `Most of run gone — chase = bad RR. Wait for retrace or skip.`;
    } else if (pctMove >= LATE_PCT) {
      verdict = "LATE"; color = "amber"; icon = "⚠";
      msg = `${pctMove.toFixed(1)}% extended`;
      sub = `Move is mature — tight stop only, smaller size`;
    } else if (rMultiple < -0.05 && Math.abs(spot - trigger) / spot * 100 < 0.5) {
      verdict = "ENTER NOW"; color = "green"; icon = "🟢";
      msg = "At intraday extreme";
      sub = `Spot ${fmtNum(spot)} testing ${fmtNum(trigger)} · ${pctMove.toFixed(1)}% move`;
    } else if (rMultiple < -0.15) {
      verdict = "WAIT"; color = "amber"; icon = "🟡";
      msg = `Pulled back from ${isCall ? "high" : "low"}`;
      sub = `${fmtNum(Math.abs(trigger - spot))} away from breakout`;
    } else if (rMultiple < 0.5) {
      verdict = "STILL GOOD"; color = "green"; icon = "🟢";
      msg = `Breaking ${isCall ? "high" : "low"}`;
      sub = `${rMultiple.toFixed(2)}R extended · ${pctMove.toFixed(1)}% move`;
    } else {
      verdict = "CHASE RISK"; color = "amber"; icon = "🟡";
      msg = "Move extended";
      sub = `${rMultiple.toFixed(2)}R - tight stop required`;
    }
    const lo = Math.min(stop, tp1, trigger, spot);
    const hi = Math.max(stop, tp1, trigger, spot);
    const span = Math.max(0.01, hi - lo);
    const pct = (val) => Math.max(0, Math.min(100, ((val - lo) / span) * 100));
    const triggerPct = pct(trigger), stopPct = pct(stop), tp1Pct = pct(tp1), spotPct = pct(spot);
    const stopBar = isCall ? `left:${stopPct}%; right:${100 - triggerPct}%` : `left:${triggerPct}%; right:${100 - stopPct}%`;
    const tpBar   = isCall ? `left:${triggerPct}%; right:${100 - tp1Pct}%` : `left:${tp1Pct}%; right:${100 - triggerPct}%`;
    return `
      <div class="card ${isUp ? "long" : "short"} ${isEarnings ? "earnings-block" : ""}" data-mover-idx="${ms.indexOf(m)}">
        <div class="card-head">
          <div>
            <div class="ticker mono">${m.ticker}</div>
            <div style="font-size:11px; color: var(--txt-3); margin-top:4px;">$${fmtNum(m.last)} <span style="color: ${isUp ? "var(--green)" : "var(--red)"}; margin-left:4px;">${fmtPct(m.pctChange)}</span></div>
          </div>
          <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end;">
            <span class="dir-pill ${isUp ? "call" : "put"}">${isUp ? "CALL" : "PUT"}</span>
            <div class="score-badge"><span class="score-num ${scoreClass((m.score||0))} mono">${fmtNum(m.score, 1)}</span><span class="score-lbl">Score</span></div>
            <button onclick="event.stopPropagation();toggleStar('${m.ticker}','movers')" style="background:transparent;border:none;cursor:pointer;color:${isStarred(m.ticker)?'gold':'var(--txt-3)'};font-size:18px;padding:0;line-height:1;" title="Star this ticker">${isStarred(m.ticker)?'★':'☆'}</button>
          </div>
        </div>
        <div class="timing ${color}">
          <span class="timing-icon">${icon}</span>
          <div class="timing-text">
            <span class="timing-verdict">${verdict}</span>
            <span class="timing-msg">${msg}</span>
            <span class="timing-sub">${sub}</span>
          </div>
          <div class="timing-countdown">
            <span class="timing-countdown-val mono" data-countdown="Daily">${cd.remaining}</span>
            <span class="timing-countdown-lbl">${cd.label}</span>
          </div>
        </div>
        <div>
          <div class="prox">
            <div class="prox-stop"  style="${stopBar}"></div>
            <div class="prox-tp"    style="${tpBar}"></div>
            <div class="prox-trigger" style="left:${triggerPct}%"></div>
            <div class="prox-spot" style="left:${spotPct}%"></div>
          </div>
          <div class="prox-labels">
            <span>Stop ${fmtNum(stop)}</span>
            <span style="color: var(--aqua);">Trig ${fmtNum(trigger)}</span>
            <span>TP1 ${fmtNum(tp1)}</span>
          </div>
        </div>
        <div class="metrics">
          <div class="metric"><span class="metric-key">Open</span><span class="metric-val mono">${fmtNum(m.open)}</span></div>
          <div class="metric"><span class="metric-key">Prev Close</span><span class="metric-val mono">${fmtNum(m.prevClose)}</span></div>
          <div class="metric"><span class="metric-key">Range %</span><span class="metric-val mono">${fmtNum(m.rangePct, 2)}%</span></div>
          <div class="metric"><span class="metric-key">Vol Ratio</span><span class="metric-val mono">${m.volRatio ? m.volRatio.toFixed(2) + "x" : "—"}</span></div>
        </div>
        <div class="tags">
          <span class="tag day">DAY</span>
          ${timeStopPillHtml('DAY')}
          ${buildTaBadge(m.ta)}
          ${buildMultiTestBadge(m.mtb)}
          ${buildTapeBadge(window._tape, m.pctChange > 0 ? 'long' : 'short')}
          ${buildVpocPill(m._vp, m.last)}
          ${isEarnings ? '<span class="tag block">⚠ Earnings</span>' : ""}
          ${m.volRatio >= 2 ? '<span class="tag preferred">High Vol</span>' : ""}
          ${Math.abs(m.pctChange) >= 5 ? '<span class="tag warn">Big Mover</span>' : ""}
          ${m.optionSymbol ? '<span class="tag neutral">📋 Contract Ready</span>' : ""}
        </div>
        <div style="margin-top:10px; display:flex; gap:6px; flex-wrap:wrap;">
          <button class="btn btn-primary" style="background:linear-gradient(180deg,#ff5e3a,#cc3a1a); padding:6px 12px; font-size:12px; font-weight:700;" onclick="event.stopPropagation();dispatchMoverToTSLive(${ms.indexOf(m)}, false, this)" title="Fire on TS LIVE (account 11975462) with STRUCTURAL stop">⚡ TS LIVE</button>
          <button class="btn btn-secondary" style="background:linear-gradient(180deg,#666,#444); padding:6px 12px; font-size:12px;" onclick="event.stopPropagation();dispatchMoverToTSLive(${ms.indexOf(m)}, true, this)" title="Queue on TS LIVE with conditional trigger activation">🎯 TS QUEUE</button>
          <button class="btn btn-primary" style="background:linear-gradient(180deg,#3a8fff,#1c64d6); padding:6px 12px; font-size:12px;" onclick="event.stopPropagation();dispatchMoverToPublic(${ms.indexOf(m)}, this)" title="Place 1ct on Public.com">📱 PUBLIC</button>
          <button class="btn btn-primary" style="background:linear-gradient(180deg,#9b6dff,#6d3fc8); padding:6px 12px; font-size:12px;" onclick="event.stopPropagation();dispatchMoverToBracket(${ms.indexOf(m)}, this)" title="Place full bracket on Public (entry + stop + TP)">📱 BRACKET</button>
        </div>
      </div>
    `;
  }).join("");
  // Attach click handlers (Apr 29 - was missing, AB caught it)
  document.querySelectorAll('.card[data-mover-idx]').forEach(el => {
    el.addEventListener("click", () => openMoverDetail(parseInt(el.dataset.moverIdx)));
  });
  } catch (e) {
    document.getElementById("grid").innerHTML = `<div class="empty">
      Movers render error: <code style="color:var(--red)">${e.message}</code><br><br>
      <span style="font-size:11px;">Stack: <pre style="white-space:pre-wrap; text-align:left; font-size:10px;">${(e.stack || "").slice(0, 500)}</pre></span>
    </div>`;
  }
}

// =============================================================================
// INIT
// =============================================================================
applyAccount();
renderTabs();
// Phase 4.20 — kick off market-context bar before tab data so window._tape is
// available by the time the first card render runs.
startMarketContextPoll();
// Phase 4.32 — kick off vision-daemon health pill (polled every 30s).
startVisionDaemonPoll();
loadActiveTab();
// Re-poll active tab every 30s
setInterval(() => loadActiveTab(), 30000);
// Live-tick the countdown labels so "5h 23m → 5h 22m" updates without a full re-render
setInterval(() => {
  document.querySelectorAll("[data-countdown]").forEach(el => {
    const cd = getCandleCountdown(el.dataset.countdown || "Daily");
    el.textContent = cd.remaining;
  });
}, 1000);
</script>
