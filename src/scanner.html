<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stratum Scanner</title>
<style>
  :root {
    --bg: #0a0b0d;
    --panel: #111318;
    --border: #1f2229;
    --text: #d7dae0;
    --muted: #6b7280;
    --accent: #a78bfa;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --purple: #a855f7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    font-size: 13px;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { margin: 0; font-size: 16px; letter-spacing: 1px; color: var(--accent); }
  .meta { color: var(--muted); font-size: 11px; }
  .meta span { margin-left: 12px; }
  button {
    background: var(--accent);
    color: #0a0b0d;
    border: 0;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    font-size: 12px;
  }
  button:hover { opacity: 0.85; }
  .tf-btn {
    background: transparent; color: var(--muted); padding: 4px 12px;
    border: 0; border-radius: 3px; cursor: pointer; font-weight: 600;
    font-size: 11px; letter-spacing: 0.5px; font-family: inherit;
  }
  .tf-btn.active { background: var(--accent); color: #0a0b0d; }
  .tf-btn:hover:not(.active) { color: var(--text); background: rgba(167,139,250,0.1); }
  .container { padding: 16px 20px; }
  .group { margin-bottom: 28px; }
  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    padding: 6px 8px;
    background: linear-gradient(90deg, rgba(167,139,250,0.15), transparent);
    border-left: 3px solid var(--accent);
  }
  .group-title { font-size: 14px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  .group-count { font-size: 11px; color: var(--muted); }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  th, td {
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th {
    color: var(--muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--panel);
  }
  tr:hover td { background: rgba(167,139,250,0.05); }
  .col-star { width: 28px; text-align: center; }
  .col-ticker { width: 140px; }
  .col-atr { width: 60px; }
  .col-price { width: 80px; }
  .col-chg { width: 70px; }
  .col-signal { width: 140px; }
  .col-combo { width: 130px; }
  .col-tf { width: 32px; text-align: center; }
  .col-vol { width: 90px; text-align: right; }
  .col-flow { width: 110px; }
  .col-analyst { width: 80px; }
  .col-tv { width: 50px; text-align: center; }
  .col-trade { width: 80px; text-align: center; }
  .col-mag   { width: 120px; }
  .mag-label { color: var(--accent); font-weight: 600; font-size: 11px; }
  .mag-level { color: var(--text); }
  .mag-pct-up   { color: var(--green); font-size: 10px; display: block; }
  .mag-pct-dn   { color: var(--red);   font-size: 10px; display: block; }

  .star-btn {
    background: none; border: 0; cursor: pointer; color: var(--muted);
    font-size: 16px; padding: 0; line-height: 1;
  }
  .star-btn.on { color: var(--yellow); }
  .star-btn:hover { color: var(--yellow); }

  .trade-btn {
    background: rgba(74,222,128,0.15);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.4);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
  }
  .trade-btn.puts {
    background: rgba(248,113,113,0.15);
    color: var(--red);
    border-color: rgba(248,113,113,0.4);
  }
  .trade-btn:hover { opacity: 0.8; }
  .trade-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  .tab {
    background: transparent;
    color: var(--muted);
    border: 0;
    border-bottom: 2px solid transparent;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  .filter-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    align-items: center;
    font-size: 12px;
  }
  .filter-row label { color: var(--muted); cursor: pointer; }
  .filter-row input[type=checkbox] { vertical-align: middle; margin-right: 5px; }

  .history-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--panel);
    padding: 12px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
  .outcome-win  { color: var(--green); }
  .outcome-loss { color: var(--red); }
  .outcome-flat { color: var(--muted); }
  .outcome-pending { color: var(--yellow); }

  .flow-bull { color: var(--green); font-weight: 600; }
  .flow-bear { color: var(--red); font-weight: 600; }
  .flow-mixed { color: var(--muted); }
  .flow-prem { color: var(--muted); font-size: 10px; display: block; }

  .analyst-buy  { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.4); padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
  .analyst-hold { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.4); padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
  .analyst-sell { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.4); padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; }
  .pt-up { color: var(--green); font-size: 10px; display: block; }
  .pt-dn { color: var(--red); font-size: 10px; display: block; }

  .tv-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(96,165,250,0.2);
    color: var(--blue);
    border: 1px solid rgba(96,165,250,0.5);
    font-size: 10px;
    font-weight: 700;
  }
  .tv-none { color: var(--muted); }
  .tv-chart-link { text-decoration: none; font-size: 14px; opacity: 0.6; }
  .tv-chart-link:hover { opacity: 1; }

  .ticker-cell { display: flex; align-items: center; gap: 6px; }
  .ticker-sym { font-weight: 700; color: var(--text); }
  .ticker-name { color: var(--muted); font-size: 10px; display: block; margin-top: 1px; }
  .arrow-up { color: var(--green); }
  .arrow-down { color: var(--red); }

  .chg-pos { color: var(--green); }
  .chg-neg { color: var(--red); }
  .atr-high { color: var(--red); }
  .atr-mid  { color: var(--yellow); }

  .signal-badge {
    color: var(--purple);
    font-weight: 500;
  }
  .signal-f2u { color: var(--red); }
  .signal-f2d { color: var(--green); }
  .signal-hammer { color: var(--green); }
  .signal-shooter { color: var(--red); }

  .combo { display: flex; gap: 2px; }
  .bar {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 700;
    font-family: monospace;
    min-width: 24px;
    text-align: center;
  }
  .bar-2U { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.4); }
  .bar-2D { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.4); }
  .bar-1  { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.4); }
  .bar-3  { background: rgba(168,85,247,0.15); color: var(--purple); border: 1px solid rgba(168,85,247,0.4); }
  .bar-sep { color: var(--muted); padding: 3px 2px; }

  .tf-up { color: var(--green); font-weight: 600; }
  .tf-down { color: var(--red); font-weight: 600; }
  .tf-none { color: var(--muted); }

  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .badge-ftfc { background: rgba(96,165,250,0.2); color: var(--blue); border: 1px solid rgba(96,165,250,0.4); }
  .badge-ftfc-up    { background: rgba(74,222,128,0.18); color: var(--green); border: 1px solid rgba(74,222,128,0.5); }
  .badge-ftfc-down  { background: rgba(248,113,113,0.18); color: var(--red);   border: 1px solid rgba(248,113,113,0.5); }
  .badge-ftfc-against { background: rgba(251,191,36,0.18); color: var(--yellow); border: 1px solid rgba(251,191,36,0.5); }
  .badge-earnings { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.4); }
  .badge-earnings-hot { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.4); }

  .vol-main { color: var(--text); }
  .vol-rel { color: var(--muted); font-size: 11px; display: block; }
  .vol-hot { color: var(--red); font-weight: 600; }
  .vol-warm { color: var(--yellow); }

  .empty { color: var(--muted); padding: 20px; text-align: center; }
  .loading { color: var(--muted); padding: 40px; text-align: center; font-size: 14px; }
  .error { color: var(--red); padding: 20px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>STRATUM SCANNER</h1>
    <div class="meta">
      <span id="meta-asof">Loading…</span>
      <span id="meta-scanned"></span>
      <span id="meta-matched"></span>
      <span id="meta-took"></span>
    </div>
  </div>
  <div style="display:flex; gap:8px; align-items:center;">
    <div class="tf-selector" style="display:flex; gap:2px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:2px;">
      <button class="tf-btn active" data-tf="Daily" onclick="setTF('Daily')">D</button>
      <button class="tf-btn" data-tf="4HR" onclick="setTF('4HR')">4HR</button>
      <button class="tf-btn" data-tf="Weekly" onclick="setTF('Weekly')">W</button>
    </div>
    <button id="refresh-btn" onclick="loadScan(true)">⟳ Refresh</button>
  </div>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" data-tab="scan" onclick="switchTab('scan')">SCAN</button>
    <button class="tab" data-tab="history" onclick="switchTab('history')">HISTORY</button>
    <button class="tab" data-tab="starred" onclick="switchTab('starred')">★ STARRED</button>
  </div>
  <div id="tab-scan">
    <div class="filter-row">
      <label><input type="checkbox" id="filter-ftfc">FTFC only</label>
      <label><input type="checkbox" id="filter-flow">Flow-aligned only</label>
      <label><input type="checkbox" id="filter-tv">TV alerts only</label>
      <label style="color: var(--green); font-weight: 600;"><input type="checkbox" id="filter-confidence">🎯 Confidence Mode</label>
    </div>
    <div id="root"><div class="loading">Scanning the universe…</div></div>
  </div>
  <div id="tab-history" style="display:none">
    <div id="history-root"><div class="loading">Loading history…</div></div>
  </div>
  <div id="tab-starred" style="display:none">
    <div id="starred-root"><div class="loading">Loading stars…</div></div>
  </div>
</div>

<script>
var GROUP_ORDER = [
  'Continuation Up', 'Continuation Down',
  'Failed 2U', 'Failed 2D',
  '2-1-2 Up', '2-1-2 Down', '2-1-2 Continuation',
  '3-1-2 Up', '3-1-2 Down',
  'Outside Bar', 'Hammer', 'Shooter',
  '1-1 Compression', 'Inside'
];

function fmtPrice(p) {
  if (p == null) return '—';
  if (p >= 1000) return '$' + p.toFixed(0);
  return '$' + p.toFixed(2);
}
function fmtPct(p) {
  if (p == null || !isFinite(p)) return '—';
  var sign = p >= 0 ? '+' : '';
  return sign + p.toFixed(1) + '%';
}
function fmtAtr(p) {
  if (p == null) return '—';
  return p.toFixed(1) + '%';
}
function fmtVol(v) {
  if (v == null) return '—';
  if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
  return String(v);
}
function signalClass(sig) {
  if (!sig) return 'signal-badge';
  if (sig.indexOf('Failed 2U') === 0) return 'signal-badge signal-f2u';
  if (sig.indexOf('Failed 2D') === 0) return 'signal-badge signal-f2d';
  if (sig === 'Hammer') return 'signal-badge signal-hammer';
  if (sig === 'Shooter') return 'signal-badge signal-shooter';
  return 'signal-badge';
}
function atrClass(a) {
  if (a == null) return '';
  if (a >= 5) return 'atr-high';
  if (a >= 3) return 'atr-mid';
  return '';
}
function comboHtml(combo) {
  if (!combo || combo.length !== 3) return '';
  return '<div class="combo">' +
    combo.map(function(b, i) {
      var cls = b ? 'bar bar-' + b : 'bar';
      var sep = i < 2 ? '<span class="bar-sep">–</span>' : '';
      return '<span class="' + cls + '">' + (b || '?') + '</span>' + sep;
    }).join('') + '</div>';
}
function tfArrow(v) {
  if (v === 'up')   return '<span class="tf-up">↑</span>';
  if (v === 'down') return '<span class="tf-down">↓</span>';
  return '<span class="tf-none">–</span>';
}
function earningsBadgeHtml(code) {
  if (!code) return '';
  var hot = code === 'NOW' || code === 'TMR';
  var cls = hot ? 'badge badge-earnings-hot' : 'badge badge-earnings';
  return '<span class="' + cls + '">📅 ' + code + '</span>';
}
function ftfcBadgeHtml(r) {
  if (!r || !r.ftfc) return '';
  var sd = signalDir(r.signal);
  var dir = r.ftfcDir; // 'UP' | 'DOWN' | null
  if (!dir) return '<span class="badge badge-ftfc">FTFC</span>';
  if (sd) {
    var aligned = (dir === 'UP' && sd === 'BULL') || (dir === 'DOWN' && sd === 'BEAR');
    if (aligned) {
      var cls = dir === 'UP' ? 'badge-ftfc-up' : 'badge-ftfc-down';
      return '<span class="badge ' + cls + '">FTFC ' + (dir === 'UP' ? '↑' : '↓') + '</span>';
    } else {
      return '<span class="badge badge-ftfc-against" title="FTFC against signal — counter-trend, skip unless exhaustion">FTFC ' + (dir === 'UP' ? '↑' : '↓') + ' ⚠</span>';
    }
  }
  // non-directional signal (Inside / Outside / 1-1)
  var cls2 = dir === 'UP' ? 'badge-ftfc-up' : 'badge-ftfc-down';
  return '<span class="badge ' + cls2 + '">FTFC ' + (dir === 'UP' ? '↑' : '↓') + '</span>';
}

function fmtPrem(n) {
  if (n == null) return '—';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + Math.round(n);
}
function flowHtml(flow) {
  if (!flow) return '<span class="flow-mixed">—</span>';
  var cls = flow.dominant === 'BULL' ? 'flow-bull' : (flow.dominant === 'BEAR' ? 'flow-bear' : 'flow-mixed');
  var label = flow.dominant === 'BULL' ? '🟢 Bull' : (flow.dominant === 'BEAR' ? '🔴 Bear' : '⚪ Mixed');
  return '<span class="' + cls + '">' + label + '</span>' +
    '<span class="flow-prem">C ' + fmtPrem(flow.callPrem) + ' / P ' + fmtPrem(flow.putPrem) + '</span>';
}
function analystHtml(r) {
  if (!r.analyst) return '<span class="flow-mixed">—</span>';
  var cls = r.analyst === 'BUY' ? 'analyst-buy' : (r.analyst === 'SELL' ? 'analyst-sell' : 'analyst-hold');
  var ptHtml = '';
  if (r.priceTargetPct != null && isFinite(r.priceTargetPct)) {
    var ptCls = r.priceTargetPct >= 0 ? 'pt-up' : 'pt-dn';
    var sign = r.priceTargetPct >= 0 ? '+' : '';
    ptHtml = '<span class="' + ptCls + '">PT ' + sign + r.priceTargetPct.toFixed(0) + '%</span>';
  }
  return '<span class="' + cls + '">' + r.analyst + '</span>' + ptHtml;
}
function tvHtml(tv) {
  if (!tv || !tv.count) return '<span class="tv-none">—</span>';
  return '<span class="tv-badge" title="' + (tv.latest && tv.latest.message ? tv.latest.message.replace(/"/g,'') : '') + '">TV ×' + tv.count + '</span>';
}
function magHtml(m) {
  if (!m) return '<span class="flow-mixed">—</span>';
  var cls = m.pct >= 0 ? 'mag-pct-up' : 'mag-pct-dn';
  var sign = m.pct >= 0 ? '+' : '';
  return '<span class="mag-label">' + m.label + '</span> <span class="mag-level">$' + m.level.toFixed(2) + '</span>' +
         '<span class="' + cls + '">' + sign + m.pct.toFixed(1) + '%</span>';
}

function signalDir(sig) {
  if (!sig) return null;
  if (sig === 'Failed 2U' || sig === 'Shooter' || sig === '2-1-2 Down' || sig === '3-1-2 Down' || sig === 'Continuation Down') return 'BEAR';
  if (sig === 'Failed 2D' || sig === 'Hammer'  || sig === '2-1-2 Up'   || sig === '3-1-2 Up'   || sig === 'Continuation Up')   return 'BULL';
  return null;
}
function tradeBtnHtml(r) {
  var dir = signalDir(r.signal);
  if (!dir) return '<span class="flow-mixed">—</span>';
  var label = dir === 'BULL' ? 'CALL' : 'PUT';
  var cls = dir === 'BULL' ? 'trade-btn' : 'trade-btn puts';
  var payload = encodeURIComponent(JSON.stringify({
    ticker: r.ticker, signal: r.signal, price: r.price,
    trigger: r.trigger || r.price, ftfc: r.ftfc,
    flow: r.flow && r.flow.dominant
  }));
  return '<button class="' + cls + '" onclick="queueTrade(\'' + payload + '\', this)">▶ ' + label + '</button>';
}
function starBtnHtml(r) {
  var on = r.starred ? ' on' : '';
  var star = r.starred ? '★' : '☆';
  return '<button class="star-btn' + on + '" onclick="toggleStar(\'' + r.ticker + '\', this)">' + star + '</button>';
}
function tickerCellHtml(r) {
  var tvUrl = 'https://www.tradingview.com/chart/?symbol=' + encodeURIComponent(r.ticker);
  return '<span class="ticker-sym">' + r.ticker + '</span>' +
         ' <a href="' + tvUrl + '" target="_blank" class="tv-chart-link" title="Open on TradingView">📈</a>';
}

function rowHtml(r) {
  var volRelClass = '';
  if (r.volRel != null) {
    if (r.volRel >= 3) volRelClass = 'vol-hot';
    else if (r.volRel >= 1.5) volRelClass = 'vol-warm';
  }
  return '<tr>' +
    '<td class="col-star">' + starBtnHtml(r) + '</td>' +
    '<td class="col-ticker">' +
      '<div class="ticker-cell">' +
        tickerCellHtml(r) +
        ftfcBadgeHtml(r) +
        earningsBadgeHtml(r.earnings) +
      '</div>' +
    '</td>' +
    '<td class="col-atr ' + atrClass(r.atrPct) + '">' + fmtAtr(r.atrPct) + '</td>' +
    '<td class="col-price">' + fmtPrice(r.price) + '</td>' +
    '<td class="col-chg ' + (r.chgPct >= 0 ? 'chg-pos' : 'chg-neg') + '">' + fmtPct(r.chgPct) + '</td>' +
    '<td class="col-signal"><span class="' + signalClass(r.signal) + '">' + r.signal + '</span></td>' +
    '<td class="col-combo">' + comboHtml(r.combo) + '</td>' +
    '<td class="col-tf">' + tfArrow(r.dwmq && r.dwmq.D) + '</td>' +
    '<td class="col-tf">' + tfArrow(r.dwmq && r.dwmq.W) + '</td>' +
    '<td class="col-tf">' + tfArrow(r.dwmq && r.dwmq.M) + '</td>' +
    '<td class="col-tf">' + tfArrow(r.dwmq && r.dwmq.Q) + '</td>' +
    '<td class="col-flow">' + flowHtml(r.flow) + '</td>' +
    '<td class="col-analyst">' + analystHtml(r) + '</td>' +
    '<td class="col-tv">' + tvHtml(r.tvAlert) + '</td>' +
    '<td class="col-mag">' + magHtml(r.magnitude) + '</td>' +
    '<td class="col-vol">' +
      '<span class="vol-main">' + fmtVol(r.volAbs) + '</span>' +
      (r.volRel != null ? '<span class="vol-rel ' + volRelClass + '">' + r.volRel.toFixed(1) + 'x</span>' : '') +
    '</td>' +
    '<td class="col-trade">' + tradeBtnHtml(r) + '</td>' +
  '</tr>';
}

function groupHtml(name, rows) {
  if (!rows || rows.length === 0) return '';
  return '<div class="group">' +
    '<div class="group-header">' +
      '<div class="group-title">' + name + '</div>' +
      '<div class="group-count">' + rows.length + '</div>' +
    '</div>' +
    '<table>' +
    '<thead><tr>' +
      '<th class="col-star"></th>' +
      '<th class="col-ticker">Ticker ↓</th>' +
      '<th class="col-atr">ATR%</th>' +
      '<th class="col-price">Price</th>' +
      '<th class="col-chg">Chg%</th>' +
      '<th class="col-signal">Signal</th>' +
      '<th class="col-combo">Combo</th>' +
      '<th class="col-tf">D</th>' +
      '<th class="col-tf">W</th>' +
      '<th class="col-tf">M</th>' +
      '<th class="col-tf">Q</th>' +
      '<th class="col-flow">Flow</th>' +
      '<th class="col-analyst">Analyst</th>' +
      '<th class="col-tv">TV</th>' +
      '<th class="col-mag">Magnitude</th>' +
      '<th class="col-vol">Vol</th>' +
      '<th class="col-trade">Trade</th>' +
    '</tr></thead>' +
    '<tbody>' + rows.map(rowHtml).join('') + '</tbody>' +
    '</table>' +
  '</div>';
}

function render(data) {
  if (!data || data.error) {
    document.getElementById('root').innerHTML =
      '<div class="error">Error: ' + (data && data.error || 'unknown') + '</div>';
    return;
  }
  document.getElementById('meta-asof').textContent = 'As of: ' + new Date(data.generatedAt).toLocaleString();
  document.getElementById('meta-scanned').textContent = 'Scanned: ' + data.scanned;
  document.getElementById('meta-matched').textContent = 'Matched: ' + data.matched;
  document.getElementById('meta-took').textContent = 'Took: ' + (data.tookMs / 1000).toFixed(1) + 's';

  var groups = data.groups || {};
  var html = '';
  GROUP_ORDER.forEach(function(k) {
    if (groups[k] && groups[k].length) html += groupHtml(k, groups[k]);
  });
  // Render any other groups not in priority order
  Object.keys(groups).forEach(function(k) {
    if (GROUP_ORDER.indexOf(k) === -1 && groups[k].length) html += groupHtml(k, groups[k]);
  });
  if (!html) {
    var cm = document.getElementById('filter-confidence') && document.getElementById('filter-confidence').checked;
    var ftfcOn = document.getElementById('filter-ftfc') && document.getElementById('filter-ftfc').checked;
    var flowOn = document.getElementById('filter-flow') && document.getElementById('filter-flow').checked;
    var tvOn   = document.getElementById('filter-tv') && document.getElementById('filter-tv').checked;
    if (cm) {
      html = '<div class="empty" style="padding: 32px; line-height: 1.8;">' +
        '<div style="font-size: 18px; color: var(--green); margin-bottom: 12px;">🎯 Zero Confidence Mode candidates right now</div>' +
        '<div style="color: var(--text);">This is the system working correctly, not a bug.</div>' +
        '<div style="color: var(--muted); margin-top: 10px;">' +
        'Confidence Mode requires: bullish signal + FTFC ↑ + magnitude 1.5–8% + volume ≥ 1.3× + flow not BEAR.<br>' +
        'None of the current ' + (_cachedData && _cachedData.matched || 0) + ' matched signals fit that profile.<br><br>' +
        '<b>A zero-setup day is a win.</b> Close the tab. Come back tomorrow.<br>' +
        'Try unchecking Confidence Mode to see all signals and study the chart setups.' +
        '</div></div>';
    } else if (ftfcOn || flowOn || tvOn) {
      html = '<div class="empty">No signals match the active filters. Try unchecking some.</div>';
    } else {
      html = '<div class="empty">No Strat signals matched on the current watchlist.</div>';
    }
  }
  document.getElementById('root').innerHTML = html;
}

var _cachedData = null;
var _currentTF = 'Daily';

function setTF(tf) {
  _currentTF = tf;
  document.querySelectorAll('.tf-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tf === tf);
  });
  loadScan(true);
}
function applyFilters(data) {
  if (!data || !data.groups) return data;
  var ftfcOnly = document.getElementById('filter-ftfc').checked;
  var flowOnly = document.getElementById('filter-flow').checked;
  var tvOnly   = document.getElementById('filter-tv').checked;
  if (!ftfcOnly && !flowOnly && !tvOnly) return data;
  var filtered = { generatedAt: data.generatedAt, tookMs: data.tookMs, scanned: data.scanned, matched: 0, groups: {} };
  Object.keys(data.groups).forEach(function(k) {
    var confidenceMode = document.getElementById('filter-confidence') && document.getElementById('filter-confidence').checked;
    var rows = data.groups[k].filter(function(r) {
      // CONFIDENCE MODE -- bullish-only, trend-aligned rebuild filter.
      // Any of the 4 BULLISH Strat patterns (Failed 2D / Hammer / 2-1-2 Up / 3-1-2 Up)
      // WITH FTFC UP + magnitude 2-5% + flow not bearish + volume 1.5x+.
      // Designed to rebuild win rate with one class of setups (bullish + trend).
      // Typical yield: 2-6 candidates per day (vs 0-2 for strict Failed 2D only).
      if (confidenceMode) {
        var bullSet = ['Failed 2D', 'Hammer', '2-1-2 Up', '3-1-2 Up', 'Continuation Up'];
        if (bullSet.indexOf(r.signal) === -1) return false;
        if (r.ftfcDir !== 'UP') return false;
        // Magnitude: 1.5% min (enough room to trade) to 8% max (not a pipe dream)
        if (!r.magnitude || Math.abs(r.magnitude.pct) < 1.5 || Math.abs(r.magnitude.pct) > 8) return false;
        if (r.flow && r.flow.dominant === 'BEAR') return false;
        // Volume 1.3x+ (loosened from 1.5x -- volume data often missing in off-hours scans)
        if (r.volRel && r.volRel < 1.3) return false;
        return true;
      }
      if (ftfcOnly) {
        var sd = signalDir(r.signal);
        if (!r.ftfcDir) return false;
        if (sd) {
          var aligned = (r.ftfcDir === 'UP' && sd === 'BULL') || (r.ftfcDir === 'DOWN' && sd === 'BEAR');
          if (!aligned) return false;
        }
      }
      if (tvOnly && !(r.tvAlert && r.tvAlert.count)) return false;
      if (flowOnly) {
        var sd2 = signalDir(r.signal);
        if (!sd2 || !r.flow || r.flow.dominant !== sd2) return false;
      }
      return true;
    });
    if (rows.length) { filtered.groups[k] = rows; filtered.matched += rows.length; }
  });
  return filtered;
}

function loadScan(force) {
  document.getElementById('refresh-btn').disabled = true;
  document.getElementById('refresh-btn').textContent = '⟳ Scanning ' + _currentTF + '…';
  var qs = 'tf=' + encodeURIComponent(_currentTF) + (force ? '&force=1' : '');
  fetch('/api/stratum-scanner?' + qs)
    .then(function(r) { return r.json(); })
    .then(function(data) { _cachedData = data; render(applyFilters(data)); })
    .catch(function(e) {
      document.getElementById('root').innerHTML = '<div class="error">Fetch failed: ' + e.message + '</div>';
    })
    .finally(function() {
      document.getElementById('refresh-btn').disabled = false;
      document.getElementById('refresh-btn').textContent = '⟳ Refresh';
    });
}

// Tab switching
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  ['scan','history','starred'].forEach(function(n) {
    document.getElementById('tab-' + n).style.display = (n === name ? '' : 'none');
  });
  if (name === 'history') loadHistory();
  if (name === 'starred') renderStarred();
}

function toggleStar(ticker, btn) {
  var on = btn.classList.contains('on');
  fetch('/api/stratum-scanner/star', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ticker: ticker, starred: !on })
  })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if (r.ok) {
        btn.classList.toggle('on', r.starred);
        btn.textContent = r.starred ? '★' : '☆';
        if (_cachedData && _cachedData.groups) {
          Object.keys(_cachedData.groups).forEach(function(k){
            _cachedData.groups[k].forEach(function(row){
              if (row.ticker === ticker) row.starred = r.starred;
            });
          });
        }
      }
    });
}

function queueTrade(payloadEncoded, btn) {
  var payload = JSON.parse(decodeURIComponent(payloadEncoded));
  if (!confirm('Queue ' + payload.ticker + ' ' + (signalDir(payload.signal) === 'BULL' ? 'CALL' : 'PUT') + ' from ' + payload.signal + '?\n\nTrigger: $' + (payload.trigger || payload.price))) return;
  btn.disabled = true;
  btn.textContent = '…';
  fetch('/api/stratum-scanner/queue', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(function(r){ return r.json(); })
    .then(function(r){
      if (r.ok) {
        btn.textContent = '✓ QUEUED';
        btn.style.background = 'rgba(167,139,250,0.2)';
      } else {
        btn.textContent = '✗';
        alert('Queue failed: ' + (r.reason || 'unknown'));
        setTimeout(function(){ btn.disabled = false; btn.textContent = '▶ ' + (signalDir(payload.signal) === 'BULL' ? 'CALL' : 'PUT'); }, 2000);
      }
    })
    .catch(function(e){
      btn.textContent = '✗';
      alert('Fetch failed: ' + e.message);
    });
}

// --- HISTORY TAB ---
function loadHistory() {
  var root = document.getElementById('history-root');
  root.innerHTML = '<div class="loading">Loading history…</div>';
  fetch('/api/stratum-scanner/history?days=5')
    .then(function(r){ return r.json(); })
    .then(renderHistory)
    .catch(function(e){ root.innerHTML = '<div class="error">Fetch failed: ' + e.message + '</div>'; });
}
function renderHistory(h) {
  var root = document.getElementById('history-root');
  var stats = h.stats || {};
  var hitRate = stats.wins + stats.losses > 0 ? ((stats.wins / (stats.wins + stats.losses)) * 100).toFixed(0) : '—';
  var html = '<div class="history-stats">' +
    '<div class="stat-card"><div class="stat-label">Total Signals (5d)</div><div class="stat-value">' + (stats.total || 0) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Hit Rate</div><div class="stat-value outcome-win">' + hitRate + (hitRate === '—' ? '' : '%') + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Wins / Losses / Flat</div><div class="stat-value"><span class="outcome-win">' + (stats.wins||0) + '</span> / <span class="outcome-loss">' + (stats.losses||0) + '</span> / <span class="outcome-flat">' + (stats.flat||0) + '</span></div></div>' +
    '<div class="stat-card"><div class="stat-label">Pending (today)</div><div class="stat-value outcome-pending">' + (stats.pending||0) + '</div></div>' +
  '</div>';
  // By-signal breakdown
  if (stats.bySignal) {
    html += '<div class="group"><div class="group-header"><div class="group-title">Hit rate by signal type</div></div>';
    html += '<table><thead><tr><th>Signal</th><th>Total</th><th>Wins</th><th>Losses</th><th>Flat</th><th>Hit Rate</th></tr></thead><tbody>';
    var sigs = Object.keys(stats.bySignal).sort(function(a,b){ return stats.bySignal[b].total - stats.bySignal[a].total; });
    sigs.forEach(function(s) {
      var b = stats.bySignal[s];
      var hr = (b.wins + b.losses) > 0 ? ((b.wins / (b.wins + b.losses)) * 100).toFixed(0) + '%' : '—';
      html += '<tr><td>' + s + '</td><td>' + b.total + '</td><td class="outcome-win">' + b.wins + '</td><td class="outcome-loss">' + b.losses + '</td><td class="outcome-flat">' + b.flat + '</td><td><b>' + hr + '</b></td></tr>';
    });
    html += '</tbody></table></div>';
  }
  // Per-day rows
  (h.days || []).slice().reverse().forEach(function(d) {
    html += '<div class="group"><div class="group-header"><div class="group-title">' + d.date + '</div><div class="group-count">' + (d.rows || []).length + ' signals</div></div>';
    html += '<table><thead><tr><th>Ticker</th><th>Signal</th><th>Dir</th><th>Price at signal</th><th>Trigger</th><th>3d Move</th><th>Outcome</th></tr></thead><tbody>';
    (d.rows || []).forEach(function(r) {
      var outCls = r.outcome === 'WIN' ? 'outcome-win' : r.outcome === 'LOSS' ? 'outcome-loss' : r.outcome === 'FLAT' ? 'outcome-flat' : 'outcome-pending';
      var outLabel = r.outcome || 'pending';
      html += '<tr>' +
        '<td><b>' + r.ticker + '</b></td>' +
        '<td>' + r.signal + '</td>' +
        '<td class="' + (r.dir === 'BULL' ? 'chg-pos' : 'chg-neg') + '">' + r.dir + '</td>' +
        '<td>' + (r.price ? '$' + r.price.toFixed(2) : '—') + '</td>' +
        '<td>' + (r.trigger ? '$' + r.trigger.toFixed(2) : '—') + '</td>' +
        '<td>' + (r.movePct != null ? '+' + r.movePct + '% fav / ' + (r.advPct || 0) + '% adv' : '—') + '</td>' +
        '<td class="' + outCls + '"><b>' + outLabel + '</b></td>' +
      '</tr>';
    });
    html += '</tbody></table></div>';
  });
  root.innerHTML = html || '<div class="empty">No history yet. History builds as scans run.</div>';
}

// --- STARRED TAB ---
function renderStarred() {
  var root = document.getElementById('starred-root');
  if (!_cachedData || !_cachedData.groups) {
    root.innerHTML = '<div class="empty">Run a scan first to see starred signals.</div>';
    return;
  }
  var starred = { generatedAt: _cachedData.generatedAt, tookMs: _cachedData.tookMs, scanned: _cachedData.scanned, matched: 0, groups: {} };
  Object.keys(_cachedData.groups).forEach(function(k) {
    var rows = _cachedData.groups[k].filter(function(r){ return r.starred; });
    if (rows.length) { starred.groups[k] = rows; starred.matched += rows.length; }
  });
  if (!starred.matched) {
    root.innerHTML = '<div class="empty">No starred tickers have signals right now. Click ☆ on any row to star.</div>';
    return;
  }
  // Render using same groupHtml logic
  var html = '';
  GROUP_ORDER.forEach(function(k) { if (starred.groups[k]) html += groupHtml(k, starred.groups[k]); });
  root.innerHTML = html;
}

// Wire filter checkboxes
['filter-ftfc','filter-flow','filter-tv','filter-confidence'].forEach(function(id) {
  document.addEventListener('DOMContentLoaded', function() {
    var el = document.getElementById(id);
    if (el) el.addEventListener('change', function(){ if (_cachedData) render(applyFilters(_cachedData)); });
  });
});
// Attach when DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    ['filter-ftfc','filter-flow','filter-tv','filter-confidence'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('change', function(){ if (_cachedData) render(applyFilters(_cachedData)); });
    });
  });
} else {
  ['filter-ftfc','filter-flow','filter-tv','filter-confidence'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.addEventListener('change', function(){ if (_cachedData) render(applyFilters(_cachedData)); });
  });
}

loadScan(false);
setInterval(function(){ loadScan(true); }, 5 * 60 * 1000);
</script>
